<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitud Intercambio | ALLENDE 1</title>

<style>
:root{
  --rojo:#c40000;
  --rojo2:#ff2b2b;
  --blanco:#ffffff;
  --gris:#f4f4f4;
  --texto:#222;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:var(--gris);
  color:var(--texto);
}

.loading{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,var(--rojo),#830000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:9999;
  transition:.4s;
}

.loading img{
  width:280px;
  max-width:90%;
  margin-bottom:25px;
}

.loading h1{
  font-size:30px;
  margin-bottom:8px;
}

.loading p{
  opacity:.9;
}

.barra-wrap{
  width:300px;
  max-width:90%;
  height:10px;
  background:rgba(255,255,255,.2);
  border-radius:30px;
  margin-top:25px;
  overflow:hidden;
}

.barra{
  width:0%;
  height:100%;
  background:white;
  transition:.3s;
}

.app{
  max-width:1200px;
  margin:auto;
  padding:15px;
}

.header{
  background:linear-gradient(90deg,var(--rojo),#8f0000);
  color:white;
  border-radius:22px;
  padding:20px;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  gap:20px;
}

.header img{
  width:180px;
  background:white;
  border-radius:14px;
  padding:8px;
}

.header h2{
  font-size:30px;
}

.header p{
  margin-top:5px;
  opacity:.9;
}

.box{
  background:white;
  border-radius:22px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.box h3{
  margin-bottom:15px;
  color:var(--rojo);
}

#buscar{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:2px solid #ddd;
  font-size:20px;
}

#buscar:focus{
  outline:none;
  border-color:var(--rojo);
}

.sugerencias{
  margin-top:10px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  display:none;
}

.item{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:hover{
  background:#fafafa;
}

.item b{
  color:var(--rojo);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#fafafa;
  text-align:left;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
}

input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:15px;
}

button{
  border:none;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-rojo{
  background:var(--rojo);
  color:white;
  flex:1;
}

.btn-sec{
  background:#efefef;
  color:#222;
  flex:1;
}

canvas{
  width:100%;
  height:180px;
  border:2px dashed #ccc;
  border-radius:18px;
  margin-top:12px;
  touch-action:none;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  justify-content:center;
  align-items:center;
  padding:15px;
}

.modal-box{
  width:100%;
  max-width:450px;
  background:white;
  border-radius:24px;
  padding:20px;
}

.modal-box h3{
  margin-bottom:15px;
}

.modal-box button{
  width:100%;
  margin-top:10px;
}

@media(max-width:700px){

  .header{
    flex-direction:column;
    text-align:center;
  }

  .actions{
    flex-direction:column;
  }

}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">

  <img src="logo.png">

  <h1>PROVEEDORA</h1>

  <p id="estadoCarga">
    Iniciando aplicación...
  </p>

  <div class="barra-wrap">
    <div class="barra" id="barra"></div>
  </div>

</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">

    <img src="logo.png">

    <div>
      <h2>
        Solicitud de Intercambio
      </h2>

      <p>
        ALLENDE 1 → ALLENDE 2
      </p>
    </div>

  </div>

  <!-- BUSCADOR -->
  <div class="box">

    <h3>
      Buscar producto
    </h3>

    <input
      id="buscar"
      placeholder="Buscar código o producto..."
      autocomplete="off"
    >

    <div class="sugerencias" id="sugerencias"></div>

  </div>

  <!-- CARRITO -->
  <div class="box">

    <h3>
      Carrito
    </h3>

    <table>

      <thead>
        <tr>
          <th>Código</th>
          <th>Producto</th>
          <th>Cant.</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="tbodyCarrito"></tbody>

    </table>

  </div>

  <!-- SOLICITUD -->
  <div class="box">

    <h3>
      Solicitud
    </h3>

    <input
      id="solicitadoPor"
      placeholder="Nombre quien solicita"
    >

    <canvas id="firma"></canvas>

    <div class="actions">

      <button
        class="btn-sec"
        onclick="guardarTemporal()"
      >
        Guardar para continuar después
      </button>

      <button
        class="btn-rojo"
        onclick="generarSolicitud()"
      >
        Solicitar intercambio
      </button>

    </div>

  </div>

</div>

<!-- MODAL PRODUCTO -->
<div class="modal" id="modal">

  <div class="modal-box">

    <h3 id="tituloProducto"></h3>

    <input
      type="number"
      id="cantidad"
      min="1"
      value="1"
    >

    <button
      class="btn-rojo"
      onclick="agregarProducto()"
    >
      Agregar
    </button>

  </div>

</div>

<script type="module">

import {
  collection,
  getDocs,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { db } from './config.js';

let catalogo = [];
let carrito = [];
let productoActual = null;
let firmaBase64 = '';

const buscarInput = document.getElementById('buscar');
const sugerencias = document.getElementById('sugerencias');
const tbodyCarrito = document.getElementById('tbodyCarrito');

function estado(txt){
  document.getElementById('estadoCarga').textContent = txt;
}

function barra(v){
  document.getElementById('barra').style.width = v + '%';
}

function normalizar(txt=''){
  return txt
    .toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^A-Z0-9 ]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function textoProducto(p){

  return normalizar([
    p.codigoBarra,
    p.concepto,
    p.marca,
    p.departamento,
    ...(p.codigosEquivalentes || [])
  ].join(' '));

}

async function cargarCatalogo(){

  estado('Descargando catálogo...');
  barra(20);

  const snap = await getDocs(collection(db,'productos'));

  catalogo = [];

  snap.forEach(docu=>{

    const d = docu.data();

    if(d.activo === true){

      catalogo.push({
        id:docu.id,
        ...d
      });

    }

  });

  localStorage.setItem(
    'catalogo_intercambios_a1',
    JSON.stringify(catalogo)
  );

  barra(60);

}

function cargarCatalogoLocal(){

  const local = localStorage.getItem(
    'catalogo_intercambios_a1'
  );

  if(local){
    catalogo = JSON.parse(local);
  }

}

function buscarProductos(){

  const q = normalizar(buscarInput.value);

  sugerencias.innerHTML = '';

  if(!q){
    sugerencias.style.display='none';
    return;
  }

  const tokens = q.split(' ');

  const resultados = catalogo

  .map(p=>{

    const texto = textoProducto(p);

    let score = 0;

    if(texto.includes(q))
      score += 100;

    tokens.forEach(t=>{

      if(texto.includes(t))
        score += 30;

    });

    return {
      ...p,
      score
    };

  })

  .filter(x=>x.score>0)

  .sort((a,b)=>b.score-a.score)

  .slice(0,25);

  resultados.forEach(p=>{

    const div = document.createElement('div');

    div.className='item';

    div.innerHTML = `
      <b>${p.codigoBarra}</b>
      <div>${p.concepto}</div>
      <small>${p.marca || ''}</small>
    `;

    div.onclick = ()=>abrirProducto(p);

    sugerencias.appendChild(div);

  });

  sugerencias.style.display='block';

}

function abrirProducto(p){

  productoActual = p;

  document.getElementById(
    'tituloProducto'
  ).textContent = p.concepto;

  document.getElementById('cantidad').value = 1;

  document.getElementById('modal').style.display='flex';

}

window.agregarProducto = function(){

  const cantidad = Number(
    document.getElementById('cantidad').value
  );

  carrito.push({

    codigo: productoActual.codigoBarra,

    descripcion: productoActual.concepto,

    cantidad_solicitada: cantidad,

    estado_item:'PENDIENTE'

  });

  renderCarrito();

  guardarTemporal();

  document.getElementById('modal').style.display='none';

  buscarInput.value='';

  sugerencias.style.display='none';

}

function renderCarrito(){

  tbodyCarrito.innerHTML='';

  carrito.forEach((x,i)=>{

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${x.codigo}</td>
      <td>${x.descripcion}</td>
      <td>${x.cantidad_solicitada}</td>
      <td>
        <button onclick="eliminarItem(${i})">
          X
        </button>
      </td>
    `;

    tbodyCarrito.appendChild(tr);

  });

}

window.eliminarItem = function(i){

  carrito.splice(i,1);

  renderCarrito();

  guardarTemporal();

}

window.guardarTemporal = function(){

  localStorage.setItem(

    'borrador_intercambio_a1',

    JSON.stringify({

      carrito,

      solicitadoPor:document.getElementById(
        'solicitadoPor'
      ).value,

      firma:firmaBase64

    })

  );

  alert('Borrador guardado');

}

function recuperarTemporal(){

  const local = localStorage.getItem(
    'borrador_intercambio_a1'
  );

  if(!local) return;

  const data = JSON.parse(local);

  carrito = data.carrito || [];

  document.getElementById(
    'solicitadoPor'
  ).value = data.solicitadoPor || '';

  firmaBase64 = data.firma || '';

  renderCarrito();

}

function folio(){

  return 'INT-A1-' + Date.now();

}

window.generarSolicitud = async function(){

  if(!carrito.length){
    alert('Agrega productos');
    return;
  }

  const solicitadoPor = document.getElementById(
    'solicitadoPor'
  ).value.trim();

  if(!solicitadoPor){
    alert('Captura quien solicita');
    return;
  }

  const f = folio();

  const documento = {

    folio:f,

    tienda_solicita:'ALLENDE 1',

    tienda_contesta:'ALLENDE 2',

    estado:'PENDIENTE_AUTORIZAR',

    solicitado_por:solicitadoPor,

    firma_solicitud:firmaBase64,

    fecha_solicitud:serverTimestamp(),

    inventario_aplicado:false,

    items:carrito

  };

  await setDoc(

    doc(
      db,
      'TIENDAS',
      'ALLENDE 1',
      'INTERCAMBIOS',
      f
    ),

    documento

  );

  imprimir(documento);

  localStorage.removeItem(
    'borrador_intercambio_a1'
  );

  carrito=[];

  renderCarrito();

  alert('Solicitud generada');

}

function imprimir(docu){

  const win = window.open('');

  win.document.write(`

    <html>

    <head>

      <title>${docu.folio}</title>

      <style>

        body{
          font-family:Arial;
          padding:20px;
        }

        table{
          width:100%;
          border-collapse:collapse;
        }

        td,th{
          border:1px solid #ccc;
          padding:8px;
        }

      </style>

    </head>

    <body>

      <img
        src="logo.png"
        style="width:240px"
      >

      <h2>
        Solicitud de Intercambio
      </h2>

      <b>Folio:</b> ${docu.folio}<br>
      <b>Solicita:</b> ALLENDE 1<br>
      <b>Contesta:</b> ALLENDE 2<br>
      <b>Estado:</b> ${docu.estado}<br><br>

      <table>

        <thead>

          <tr>
            <th>Código</th>
            <th>Producto</th>
            <th>Cantidad</th>
          </tr>

        </thead>

        <tbody>

          ${docu.items.map(x=>`

            <tr>
              <td>${x.codigo}</td>
              <td>${x.descripcion}</td>
              <td>${x.cantidad_solicitada}</td>
            </tr>

          `).join('')}

        </tbody>

      </table>

      <br><br>

      <b>Solicita:</b>
      ${docu.solicitado_por}

      <br><br>

      <img
        src="${docu.firma_solicitud}"
        style="width:220px"
      >

      <script>
        window.print()
      <\/script>

    </body>

    </html>

  `);

}

function iniciarFirma(){

  const canvas = document.getElementById('firma');

  const ctx = canvas.getContext('2d');

  let dibujando = false;

  canvas.width = canvas.offsetWidth;

  canvas.height = canvas.offsetHeight;

  function pos(e){

    const r = canvas.getBoundingClientRect();

    return {

      x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,

      y:(e.touches?e.touches[0].clientY:e.clientY)-r.top

    };

  }

  function start(e){

    dibujando=true;

    const p = pos(e);

    ctx.beginPath();

    ctx.moveTo(p.x,p.y);

  }

  function move(e){

    if(!dibujando) return;

    const p = pos(e);

    ctx.lineWidth=2;

    ctx.lineCap='round';

    ctx.strokeStyle='#111';

    ctx.lineTo(p.x,p.y);

    ctx.stroke();

    firmaBase64 = canvas.toDataURL();

  }

  function end(){

    dibujando=false;

    firmaBase64 = canvas.toDataURL();

  }

  canvas.addEventListener('mousedown',start);

  canvas.addEventListener('mousemove',move);

  canvas.addEventListener('mouseup',end);

  canvas.addEventListener('touchstart',start);

  canvas.addEventListener('touchmove',move);

  canvas.addEventListener('touchend',end);

}

async function init(){

  estado('Recuperando catálogo local...');

  cargarCatalogoLocal();

  barra(15);

  await cargarCatalogo();

  estado('Recuperando borrador...');

  recuperarTemporal();

  barra(90);

  iniciarFirma();

  estado('Aplicación lista');

  barra(100);

  setTimeout(()=>{

    document.getElementById(
      'loading'
    ).style.opacity='0';

    setTimeout(()=>{

      document.getElementById(
        'loading'
      ).style.display='none';

    },400);

  },500);

}

buscarInput.addEventListener(
  'input',
  buscarProductos
);

window.onload = init;

</script>

</body>
</html>
