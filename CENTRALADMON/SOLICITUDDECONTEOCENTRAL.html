<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PROVSOFT | Solicitud Conteo Diario</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
.app{max-width:1100px;margin:auto;padding:20px}
.header{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
.panel{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
button{padding:10px;border:none;border-radius:6px;cursor:pointer}
.btn-blue{background:#2563eb;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-gray{background:#e5e7eb}
.btn-red{background:#dc2626;color:#fff}
input{padding:10px;width:100%;border:1px solid #ccc;border-radius:6px}
.table{width:100%;border-collapse:collapse}
.table td,.table th{padding:8px;border-bottom:1px solid #ddd}
.results{background:#fff;border:1px solid #ccc;position:absolute;width:100%;display:none;max-height:250px;overflow:auto}
.result-item{padding:8px;cursor:pointer}
.result-item:hover{background:#f1f5f9}
.loader{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column}
.hide{display:none}
</style>
</head>

<body>

<div id="loader" class="loader">
  <h3>PROVSOFT · Cargando listado...</h3>
  <div id="loaderBar" style="height:10px;background:#dc2626;width:0%"></div>
</div>

<div class="app">

<div class="header">
  <b>PROVEEDORA DE DULCES Y DESECHABLES CENTRAL</b><br>
  Solicita: AUDITORIA PDD
</div>

<div class="panel">
  <input id="buscador" placeholder="Buscar producto">
  <div id="resultados" class="results"></div>

  <br>
  <button class="btn-blue" id="btnActualizar">Actualizar listado</button>
  <button class="btn-green" id="btnSugeridos">Cargar sugeridos</button>
  <button class="btn-gray" id="btnLimpiar">Limpiar</button>

  <div id="status"></div>
</div>

<div class="panel">
  <table class="table">
    <thead>
      <tr>
        <th>Código</th>
        <th>Producto</th>
        <th>Quitar</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <br>
  <button class="btn-red" id="btnCrear">Crear solicitud</button>
</div>

</div>

<script type="module">
import { db } from "./config.js";
import {
  collection,
  getDocs,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CONTEO_REF = collection(db, "TIENDAS", "CENTRAL", "CONTEO_DIARIO");

let listado = [];
let carrito = [];

const sugeridos = [
["75035259","MARLBORO BLANCO 100"],
["75001322","MARLBORO ROJO DURO"],
["7689","CHAROLA 7X7"],
["7506174512255","SNICKERS"],
["7750670007047","BIG COLA 500"],
["3062","AGUA GYM 500"]
];

function pintarCarrito(){
  const tb = document.getElementById("tbody");
  tb.innerHTML = carrito.map((p,i)=>`
    <tr>
      <td>${p.codigo}</td>
      <td>${p.nombre}</td>
      <td><button onclick="quitar(${i})">X</button></td>
    </tr>
  `).join("");
}

window.quitar = i=>{
  carrito.splice(i,1);
  pintarCarrito();
};

function agregar(p){
  if(carrito.find(x=>x.codigo===p.codigo)) return;
  carrito.push(p);
  pintarCarrito();
}

document.getElementById("btnSugeridos").onclick=()=>{
  sugeridos.forEach(([c,n])=>{
    agregar({codigo:c,nombre:n});
  });
};

document.getElementById("btnLimpiar").onclick=()=>{
  carrito=[];
  pintarCarrito();
};

document.getElementById("btnCrear").onclick=async()=>{
  const folio = "CD-"+Date.now();

  await setDoc(doc(CONTEO_REF, folio), {
    folio,
    estatus:"PENDIENTE",
    sucursal:"CENTRAL",
    solicitadoPor:"AUDITORIA PDD",
    fechaSolicitud:serverTimestamp(),
    productos:carrito
  });

  alert("Guardado: "+folio);
  carrito=[];
  pintarCarrito();
};

document.getElementById("buscador").oninput=e=>{
  const q=e.target.value.toLowerCase();
  const res=listado.filter(p=>p.nombre.includes(q)).slice(0,20);

  const box=document.getElementById("resultados");
  box.innerHTML=res.map(p=>`
    <div class="result-item">${p.codigo} - ${p.nombre}</div>
  `).join("");

  box.style.display="block";

  box.querySelectorAll(".result-item").forEach((el,i)=>{
    el.onclick=()=>agregar(res[i]);
  });
};

async function cargar(){
  const snap = await getDocs(collection(db,"TIENDAS","CENTRAL","inventario1"));
  listado = snap.docs.map(d=>({
    codigo:d.id,
    nombre:(d.data().descripcion||"").toLowerCase()
  }));
}

await cargar();
document.getElementById("loader").classList.add("hide");

</script>

</body>
</html>
