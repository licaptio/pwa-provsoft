<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario vs Ventas por Fecha - PROVSOFT</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    :root {
      --azul: #00416A;
      --azul2: #0c6cbd;
      --gris: #e5e7eb;
      --gris2: #f8fafc;
      --texto: #1f2937;
      --verde: #166534;
      --rojo: #991b1b;
      --shadow: 0 10px 28px rgba(0,0,0,.10);

      --inv-head: #ffffff;
      --inv-cell: #ffffff;

      --trans-head: #dbeafe;
      --trans-cell: #eff6ff;

      --vta-head: #dcfce7;
      --vta-cell: #ecfdf5;

      --neto-head: #ecfccb;
      --neto-cell: #f7fee7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: var(--texto);
    }

    .wrap {
      max-width: 100%;
      padding: 18px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      background: linear-gradient(135deg, var(--azul), var(--azul2));
      color: white;
      padding: 18px 20px;
    }

    .topbar h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .topbar p {
      margin: 0;
      opacity: .95;
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--gris);
      background: #fff;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: bold;
      color: #475569;
    }

    .field input,
    .field button {
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 10px 12px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      background: white;
    }

    .field button {
      cursor: pointer;
      border: none;
      background: var(--azul);
      color: white;
      font-weight: bold;
    }

    .field button.sec {
      background: #0f766e;
    }

    .status {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--gris);
      background: var(--gris2);
    }

    .status.ok { color: var(--verde); }
    .status.error { color: var(--rojo); }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gris);
      background: #fff;
    }

    .pill {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 260px);
      background: white;
    }

    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      color: #0f172a;
    }

    th, td {
      border: 1px solid #dbe4f0;
      padding: 8px 10px;
      white-space: nowrap;
      text-align: right;
      vertical-align: middle;
    }

    th.left, td.left {
      text-align: left;
    }

    .sticky1 {
      position: sticky;
      left: 0;
      z-index: 4;
      background: #fff;
      min-width: 130px;
      max-width: 130px;
    }

    .sticky2 {
      position: sticky;
      left: 130px;
      z-index: 4;
      background: #fff;
      min-width: 340px;
      max-width: 340px;
    }

    thead .sticky1,
    thead .sticky2,
    tfoot .sticky1,
    tfoot .sticky2 {
      background: #ffffff;
    }

    th.inv-col { background: var(--inv-head) !important; }
    td.inv-col { background: var(--inv-cell) !important; }

    th.trans-col { background: var(--trans-head); }
    td.trans-col {
      background: var(--trans-cell);
      color: #1d4ed8;
      font-weight: bold;
    }

    th.vta-col { background: var(--vta-head); }
    td.vta-col {
      background: var(--vta-cell);
      color: #166534;
      font-weight: bold;
    }

    th.total-col, td.total-col {
      background: #f8fafc;
      font-weight: bold;
    }

    th.neto-col { background: var(--neto-head); }
    td.neto-col {
      background: var(--neto-cell);
      font-weight: bold;
    }

    td.num-zero {
      color: #94a3b8;
    }

    td.negativo {
      color: #b91c1c;
      font-weight: bold;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      background: #ecfdf5;
      font-weight: bold;
      z-index: 3;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .sticky2 {
        min-width: 220px;
        max-width: 220px;
      }

      .topbar h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <h1>Inventario vs Ventas por Fecha - <span id="tituloTienda">CENTRAL</span></h1>
        <p>
          Fórmula operativa: inventario inicial + transferencias - ventas.
        </p>
      </div>

      <div class="controls">
        <div class="field">
          <label>Filtro código</label>
          <input type="text" id="filtroCodigo" placeholder="Ej. 010921" />
        </div>

        <div class="field">
          <label>Filtro descripción</label>
          <input type="text" id="filtroDescripcion" placeholder="Buscar descripción" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <div style="display:flex; gap:10px;">
            <button id="btnCargar" style="flex:1;">Cargar</button>
            <button id="btnExportar" class="sec" style="flex:1;">Exportar Excel</button>
          </div>
        </div>
      </div>

      <div id="status" class="status">Esperando consulta...</div>
      <div id="summary" class="summary"></div>

      <div class="table-wrap">
        <table id="tablaPivot">
          <thead></thead>
          <tbody></tbody>
          <tfoot></tfoot>
        </table>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "inventariopv-643f1.firebaseapp.com",
      projectId: "inventariopv-643f1",
      storageBucket: "inventariopv-643f1.firebasestorage.app",
      messagingSenderId: "96242533231",
      appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const $ = (id) => document.getElementById(id);

    const tabla = $("tablaPivot");
    const thead = tabla.querySelector("thead");
    const tbody = tabla.querySelector("tbody");
    const tfoot = tabla.querySelector("tfoot");

    let ultimaPivot = null;
    let equivalentesCatalogoMap = {};

    function getTiendaActual() {
      return "CENTRAL";
    }

    function getRefsPorTienda() {
      const TIENDA = getTiendaActual();

      return {
        TIENDA,
        INVENTARIOS_REF: db.collection("TIENDAS").doc(TIENDA).collection("inventario1"),
        TRANSFERENCIAS_REF: db.collection("TIENDAS").doc(TIENDA).collection("TECNOTRANSF"),
        VENTAS_REF: db.collection("TIENDAS").doc(TIENDA).collection("ventas"),
        PRODUCTOS_REF: db.collection("productos")
      };
    }

    function setStatus(msg, type = "") {
      const el = $("status");
      el.textContent = msg;
      el.className = "status " + type;
    }

    function fmtNum(n) {
      return Number(n || 0).toLocaleString("es-MX", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function limpiarTabla() {
      thead.innerHTML = "";
      tbody.innerHTML = "";
      tfoot.innerHTML = "";
      $("summary").innerHTML = "";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizarFecha(valor) {
      if (!valor) return "";

      if (typeof valor === "string") {
        const v = valor.trim();

        const m1 = v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (m1) {
          const [, dd, mm, yyyy] = m1;
          return `${yyyy}-${mm}-${dd}`;
        }

        const m2 = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m2) {
          return `${m2[1]}-${m2[2]}-${m2[3]}`;
        }

        return v;
      }

      if (valor && typeof valor.toDate === "function") {
        return valor.toDate().toISOString().slice(0, 10);
      }

      if (valor && typeof valor.seconds === "number") {
        return new Date(valor.seconds * 1000).toISOString().slice(0, 10);
      }

      return String(valor).trim();
    }

    function normalizarCodigo(valor) {
      const s = String(valor ?? "").trim();
      if (!s) return "";

      const soloDigitos = s.replace(/\D/g, "");
      if (!soloDigitos) return s.toLowerCase();

      return soloDigitos.replace(/^0+/, "") || "0";
    }

    function obtenerCampo(data, nombres = []) {
      for (const nombre of nombres) {
        if (data[nombre] !== undefined && data[nombre] !== null) {
          return data[nombre];
        }
      }
      return "";
    }

    function obtenerCodigoVenta(data) {
      return String(obtenerCampo(data, [
        "Codigo",
        "codigo",
        "Código",
        "CODIGO"
      ]) || "").trim();
    }

    function obtenerDescripcionVenta(data) {
      return String(obtenerCampo(data, [
        "descripcion",
        "Descripción",
        "Descripcion",
        "producto",
        "Producto"
      ]) || "").trim();
    }

    function obtenerCantidadVenta(data) {
      return Number(obtenerCampo(data, [
        "Cantidad vendida",
        "cantidad vendida",
        "Cantidad",
        "cantidad",
        "cant",
        "unidades",
        "totalCantidad"
      ]) || 0);
    }

    function obtenerFechaVenta(data) {
      return normalizarFecha(obtenerCampo(data, [
        "Fecha",
        "fecha",
        "FECHA"
      ]));
    }

    async function cargarEquivalentesCatalogo() {
      const { PRODUCTOS_REF } = getRefsPorTienda();

      const snap = await PRODUCTOS_REF
        .where("activo", "==", true)
        .get();

      const mapa = {};
      const catalogo = new Map();

      snap.forEach(doc => {
        const p = doc.data() || {};

        const codigoOriginal = String(
          p.codigoBarra ??
          p.codigo ??
          p.Codigo ??
          doc.id ??
          ""
        ).trim();

        if (!codigoOriginal) return;

        const codigoOriginalKey = normalizarCodigo(codigoOriginal);

        const descripcionOriginal = String(
          p.concepto ??
          p.descripcion ??
          p.Descripcion ??
          ""
        ).trim();

        catalogo.set(codigoOriginal, descripcionOriginal);

        const equivalentes = Array.isArray(p.codigosEquivalentes)
          ? p.codigosEquivalentes
          : [];

        equivalentes.forEach(eq => {
          const codigoEquivalente = String(eq ?? "").trim();
          if (!codigoEquivalente) return;

          const codigoEquivalenteKey = normalizarCodigo(codigoEquivalente);
          if (!codigoEquivalenteKey) return;

          mapa[codigoEquivalenteKey] = {
            codigoOriginal,
            codigoOriginalKey,
            descripcionOriginal,
            codigoEquivalente
          };
        });
      });

      equivalentesCatalogoMap = mapa;

      return {
        totalProductos: snap.size,
        totalAliases: Object.keys(mapa).length,
        catalogo
      };
    }

    function resolverVentaPorCodigoEquivalente(codigo, descripcion) {
      const codigoVenta = String(codigo || "").trim();
      const codigoVentaKey = normalizarCodigo(codigoVenta);
      const alias = equivalentesCatalogoMap[codigoVentaKey];

      if (!alias) {
        return {
          codigo: codigoVenta,
          codigoKey: codigoVentaKey,
          descripcion,
          fueAlias: false,
          codigoVendidoOriginal: codigoVenta
        };
      }

      return {
        codigo: alias.codigoOriginal,
        codigoKey: alias.codigoOriginalKey,
        descripcion: alias.descripcionOriginal || descripcion,
        fueAlias: true,
        codigoVendidoOriginal: codigoVenta
      };
    }

    async function cargarInventarios() {
      const { INVENTARIOS_REF } = getRefsPorTienda();

      const foliosSnap = await INVENTARIOS_REF
        .orderBy(firebase.firestore.FieldPath.documentId(), "asc")
        .get();

      const docs = [];
      const catalogo = new Map();

      for (const folioDoc of foliosSnap.docs) {
        const itemsSnap = await folioDoc.ref.collection("items").get();

        itemsSnap.forEach(itemDoc => {
          const data = itemDoc.data() || {};

          const codigoOriginal = String(data.codigo ?? data.Codigo ?? "").trim();
          const descripcion = String(data.descripcion ?? data.Descripcion ?? "").trim();
          const fecha = normalizarFecha(data.fecha ?? data.Fecha ?? "");
          const cantidad = Number(data.cantidad ?? data.Cantidad ?? 0);

          if (!codigoOriginal || !fecha || !Number.isFinite(cantidad)) return;

          docs.push({
            origen: "INV",
            id: itemDoc.id,
            codigo: codigoOriginal,
            codigoKey: normalizarCodigo(codigoOriginal),
            descripcion,
            fecha,
            cantidad
          });

          if (!catalogo.has(codigoOriginal)) {
            catalogo.set(codigoOriginal, descripcion);
          }
        });
      }

      return {
        docs,
        totalFolios: foliosSnap.size,
        catalogo
      };
    }

    async function cargarTransferencias() {
      const { TRANSFERENCIAS_REF } = getRefsPorTienda();
      const transferSnap = await TRANSFERENCIAS_REF.get();

      const docs = [];
      const catalogo = new Map();

      for (const doc of transferSnap.docs) {
        const data = doc.data() || {};

        if (data.afecta_inventario === false) continue;

        let fecha = normalizarFecha(
          data.fecha ||
          data.fecha_guardado_server ||
          data.fecha_guardado ||
          data.fecha_surtido_completo
        );

        if (!fecha) {
          const matchId = String(doc.id).match(/(\d{4})-(\d{2})-(\d{2})/);
          if (matchId) {
            fecha = `${matchId[1]}-${matchId[2]}-${matchId[3]}`;
          }
        }

        const detalle = Array.isArray(data.items)
          ? data.items
          : Array.isArray(data.detalle)
            ? data.detalle
            : [];

        for (const item of detalle) {
          const codigoOriginal = String(item.codigo || "").trim();

          const cantidad = Number(
            item.cantidad ??
            item.cantidad_surtida ??
            item.cantidad_solicitada ??
            0
          );

          const descripcion = String(
            item.nombre ||
            item.descripcion ||
            item.Descripcion ||
            ""
          ).trim();

          if (!codigoOriginal || !fecha || !Number.isFinite(cantidad) || cantidad <= 0) {
            continue;
          }

          docs.push({
            origen: "TRANS",
            id: `${doc.id}_${codigoOriginal}`,
            codigo: codigoOriginal,
            codigoKey: normalizarCodigo(codigoOriginal),
            descripcion,
            fecha,
            cantidad
          });

          if (!catalogo.has(codigoOriginal)) {
            catalogo.set(codigoOriginal, descripcion);
          }
        }
      }

      console.log("TECNOTRANSF docs leídos:", transferSnap.size);
      console.log("TECNOTRANSF items sumados:", docs.length);

      return {
        docs,
        totalTransferDocs: transferSnap.size,
        catalogo
      };
    }

    async function cargarVentas() {
      const { VENTAS_REF } = getRefsPorTienda();
      const ventasSnap = await VENTAS_REF.get();

      const docs = [];
      const catalogo = new Map();

      ventasSnap.forEach(doc => {
        const data = doc.data() || {};

        const codigoLeido = obtenerCodigoVenta(data);
        const descripcionLeida = obtenerDescripcionVenta(data);
        const resuelto = resolverVentaPorCodigoEquivalente(codigoLeido, descripcionLeida);

        const venta = {
          origen: "VTA",
          id: doc.id,
          codigo: resuelto.codigo,
          codigoKey: resuelto.codigoKey,
          descripcion: resuelto.descripcion,
          fecha: obtenerFechaVenta(data),
          cantidad: obtenerCantidadVenta(data),
          aliasAplicado: resuelto.fueAlias,
          codigoVendidoOriginal: resuelto.codigoVendidoOriginal
        };

        if (venta.codigoKey && venta.fecha && Number.isFinite(venta.cantidad)) {
          docs.push(venta);
        }

        if (resuelto.codigo && !catalogo.has(resuelto.codigo)) {
          catalogo.set(resuelto.codigo, resuelto.descripcion);
        }
      });

      return {
        docs,
        totalVentasDocs: ventasSnap.size,
        totalAliasAplicados: docs.filter(x => x.aliasAplicado).length,
        catalogo
      };
    }

    async function cargarTodo() {
      try {
        limpiarTabla();
        setStatus("Consultando inventario inicial, transferencias y ventas...");

        const equivalentesCatalogoData = await cargarEquivalentesCatalogo();

        const filtroCodigo = $("filtroCodigo").value.trim().toLowerCase();
        const filtroDescripcion = $("filtroDescripcion").value.trim().toLowerCase();

        const [inventariosData, transferenciasData, ventasData] = await Promise.all([
          cargarInventarios(),
          cargarTransferencias(),
          cargarVentas()
        ]);

        let registros = [
          ...inventariosData.docs,
          ...transferenciasData.docs,
          ...ventasData.docs
        ];

        registros = registros.filter(item => {
          const codigoVisible = String(item.codigo || "").toLowerCase();
          const codigoKey = String(item.codigoKey || "").toLowerCase();
          const descripcion = String(item.descripcion || "").toLowerCase();

          const okCodigo = !filtroCodigo ||
            codigoVisible.includes(filtroCodigo) ||
            codigoKey.includes(
              filtroCodigo.replace(/\D/g, "").replace(/^0+/, "") || filtroCodigo
            );

          const okDescripcion = !filtroDescripcion || descripcion.includes(filtroDescripcion);

          return okCodigo && okDescripcion;
        });

        registros.sort((a, b) => {
          const fa = String(a.fecha || "");
          const fb = String(b.fecha || "");
          if (fa !== fb) return fa.localeCompare(fb, "es");

          const ordenOrigen = { INV: 1, TRANS: 2, VTA: 3 };
          if (a.origen !== b.origen) {
            return (ordenOrigen[a.origen] || 99) - (ordenOrigen[b.origen] || 99);
          }

          return String(a.codigo || "").localeCompare(String(b.codigo || ""), "es");
        });

        if (!registros.length) {
          setStatus("No se encontraron registros.", "error");
          return;
        }

        const pivot = construirPivot(registros);
        ultimaPivot = pivot;

        pintarResumen(registros, pivot, {
          totalAliasesCatalogo: equivalentesCatalogoData.totalAliases || 0,
          totalAliasAplicados: ventasData.totalAliasAplicados || 0
        });

        pintarTabla(pivot);

        setStatus(
          `Listo. Inventario: ${inventariosData.docs.length} | Transferencias: ${transferenciasData.docs.length} | Ventas: ${ventasData.docs.length} | Códigos: ${pivot.totalCodigos}`,
          "ok"
        );
      } catch (err) {
        console.error(err);
        setStatus("Error al consultar Firestore: " + err.message, "error");
      }
    }

    function construirPivot(registros) {
      const mapa = new Map();

      const totalInvPorFecha = {};
      const totalTransPorFecha = {};
      const totalVtaPorFecha = {};

      const fechasConMovimiento = new Set();

      for (const item of registros) {
        const codigoKey = String(item.codigoKey || "").trim();
        const fecha = String(item.fecha || "").trim();
        const cantidad = Number(item.cantidad || 0);
        const origen = String(item.origen || "").trim();

        if (!codigoKey || !fecha || !Number.isFinite(cantidad)) continue;

        fechasConMovimiento.add(fecha);

        if (!mapa.has(codigoKey)) {
          mapa.set(codigoKey, {
            codigo: String(item.codigo || "").trim(),
            codigoKey,
            descripcion: String(item.descripcion || "").trim(),
            invPorFecha: {},
            transPorFecha: {},
            vtaPorFecha: {},
            totalInvBase: 0,
            totalTrans: 0,
            totalVta: 0,
            totalInv: 0,
            neto: 0
          });
        }

        const row = mapa.get(codigoKey);

        if (item.codigo && !row.codigo) row.codigo = item.codigo;
        if (item.descripcion && !row.descripcion) row.descripcion = item.descripcion;

        if (origen === "INV") {
          row.invPorFecha[fecha] = (row.invPorFecha[fecha] || 0) + cantidad;
          totalInvPorFecha[fecha] = (totalInvPorFecha[fecha] || 0) + cantidad;
        }

        if (origen === "TRANS") {
          row.transPorFecha[fecha] = (row.transPorFecha[fecha] || 0) + cantidad;
          totalTransPorFecha[fecha] = (totalTransPorFecha[fecha] || 0) + cantidad;
        }

        if (origen === "VTA") {
          row.vtaPorFecha[fecha] = (row.vtaPorFecha[fecha] || 0) + cantidad;
          totalVtaPorFecha[fecha] = (totalVtaPorFecha[fecha] || 0) + cantidad;
        }
      }

      const fechas = Array.from(fechasConMovimiento).sort();

      const columnas = [];
      for (const fecha of fechas) {
        if (totalInvPorFecha[fecha] > 0) columnas.push({ fecha, tipo: "INV" });
        if (totalTransPorFecha[fecha] > 0) columnas.push({ fecha, tipo: "TRANS" });
        if (totalVtaPorFecha[fecha] > 0) columnas.push({ fecha, tipo: "VTA" });
      }

      let totalInvGeneralBase = 0;
      let totalTransGeneral = 0;
      let totalVtaGeneral = 0;
      let totalNetoGeneral = 0;

      const rows = Array.from(mapa.values()).map(row => {
        row.totalInvBase = Object.values(row.invPorFecha).reduce((a, b) => a + Number(b || 0), 0);
        row.totalTrans = Object.values(row.transPorFecha).reduce((a, b) => a + Number(b || 0), 0);
        row.totalVta = Object.values(row.vtaPorFecha).reduce((a, b) => a + Number(b || 0), 0);

        row.totalInv = row.totalInvBase + row.totalTrans;
        row.neto = row.totalInv - row.totalVta;

        totalInvGeneralBase += row.totalInvBase;
        totalTransGeneral += row.totalTrans;
        totalVtaGeneral += row.totalVta;
        totalNetoGeneral += row.neto;

        return row;
      }).sort((a, b) => {
        const da = String(a.descripcion || "").trim();
        const db = String(b.descripcion || "").trim();
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return da.localeCompare(db, "es", { sensitivity: "base" });
      });

      return {
        fechas,
        columnas,
        rows,
        totalInvPorFecha,
        totalTransPorFecha,
        totalVtaPorFecha,
        totalInvGeneralBase,
        totalTransGeneral,
        totalInvGeneral: totalInvGeneralBase + totalTransGeneral,
        totalVtaGeneral,
        totalNetoGeneral,
        totalCodigos: rows.length
      };
    }

    function pintarResumen(registros, pivot, extra = {}) {
      const totalInvRegs = registros.filter(x => x.origen === "INV").length;
      const totalTransRegs = registros.filter(x => x.origen === "TRANS").length;
      const totalVtaRegs = registros.filter(x => x.origen === "VTA").length;

      $("summary").innerHTML = `
        <div class="pill">Inventario inicial: ${fmtNum(totalInvRegs)}</div>
        <div class="pill">Transferencias: ${fmtNum(totalTransRegs)}</div>
        <div class="pill">Ventas: ${fmtNum(totalVtaRegs)}</div>
        <div class="pill">Alias catálogo: ${fmtNum(extra.totalAliasesCatalogo || 0)}</div>
        <div class="pill">Ventas por alias: ${fmtNum(extra.totalAliasAplicados || 0)}</div>
        <div class="pill">Códigos únicos: ${fmtNum(pivot.totalCodigos)}</div>
        <div class="pill">Inventario base: ${fmtNum(pivot.totalInvGeneralBase)}</div>
        <div class="pill">Transferencias suma: ${fmtNum(pivot.totalTransGeneral)}</div>
        <div class="pill">Total entradas: ${fmtNum(pivot.totalInvGeneral)}</div>
        <div class="pill">Total ventas: ${fmtNum(pivot.totalVtaGeneral)}</div>
        <div class="pill">Neto: ${fmtNum(pivot.totalNetoGeneral)}</div>
      `;
    }

    function claseColumna(tipo) {
      if (tipo === "INV") return "inv-col";
      if (tipo === "TRANS") return "trans-col";
      if (tipo === "VTA") return "vta-col";
      return "total-col";
    }

    function pintarTabla(pivot) {
      const {
        columnas,
        rows,
        totalInvPorFecha,
        totalTransPorFecha,
        totalVtaPorFecha,
        totalInvGeneral,
        totalVtaGeneral,
        totalNetoGeneral
      } = pivot;

      const trHead = document.createElement("tr");
      trHead.innerHTML = `
        <th class="left sticky1">Código</th>
        <th class="left sticky2">Descripción</th>
        ${columnas.map(col => `
          <th class="${claseColumna(col.tipo)}">
            ${escapeHtml(col.fecha)} ${col.tipo}
          </th>
        `).join("")}
        <th class="total-col">TOTAL INV</th>
        <th class="total-col">TOTAL VTA</th>
        <th class="neto-col">TEÓRICO / NETO</th>
      `;
      thead.appendChild(trHead);

      const frag = document.createDocumentFragment();

      for (const row of rows) {
        const tr = document.createElement("tr");

        let html = `
          <td class="left sticky1">${escapeHtml(row.codigo)}</td>
          <td class="left sticky2">${escapeHtml(row.descripcion || "")}</td>
        `;

        for (const col of columnas) {
          let val = 0;

          if (col.tipo === "INV") {
            val = row.invPorFecha[col.fecha] || 0;
          } else if (col.tipo === "TRANS") {
            val = row.transPorFecha[col.fecha] || 0;
          } else {
            val = row.vtaPorFecha[col.fecha] || 0;
          }

          const clase = claseColumna(col.tipo);
          const tieneValor = Number(val) !== 0;

          html += `
            <td class="${clase} ${!tieneValor ? "num-zero" : ""}">
              ${!tieneValor ? "" : fmtNum(val)}
            </td>
          `;
        }

        html += `
          <td class="total-col">${fmtNum(row.totalInv)}</td>
          <td class="total-col">${fmtNum(row.totalVta)}</td>
          <td class="neto-col ${row.neto < 0 ? "negativo" : ""}">${fmtNum(row.neto)}</td>
        `;

        tr.innerHTML = html;
        frag.appendChild(tr);
      }

      tbody.appendChild(frag);

      const trFoot = document.createElement("tr");
      trFoot.innerHTML = `
        <td class="left sticky1"><b>TOTAL</b></td>
        <td class="left sticky2"><b>Suma por fecha</b></td>
        ${columnas.map(col => {
          let val = 0;

          if (col.tipo === "INV") {
            val = totalInvPorFecha[col.fecha] || 0;
          } else if (col.tipo === "TRANS") {
            val = totalTransPorFecha[col.fecha] || 0;
          } else {
            val = totalVtaPorFecha[col.fecha] || 0;
          }

          const clase = claseColumna(col.tipo);
          return `<td class="${clase}"><b>${fmtNum(val)}</b></td>`;
        }).join("")}
        <td class="total-col"><b>${fmtNum(totalInvGeneral)}</b></td>
        <td class="total-col"><b>${fmtNum(totalVtaGeneral)}</b></td>
        <td class="neto-col"><b>${fmtNum(totalNetoGeneral)}</b></td>
      `;
      tfoot.appendChild(trFoot);
    }

    function excelCellStyle(tipo, bold = false) {
      const fills = {
        INV: "FFFFFF",
        TRANS: "DBEAFE",
        VTA: "DCFCE7",
        NETO: "ECFCCB",
        TOTAL: "F8FAFC",
        HEAD: "D9EAF7"
      };

      return {
        font: { bold, color: { rgb: "0F172A" } },
        fill: { patternType: "solid", fgColor: { rgb: fills[tipo] || "FFFFFF" } },
        border: {
          top: { style: "thin", color: { rgb: "CBD5E1" } },
          bottom: { style: "thin", color: { rgb: "CBD5E1" } },
          left: { style: "thin", color: { rgb: "CBD5E1" } },
          right: { style: "thin", color: { rgb: "CBD5E1" } }
        },
        alignment: { vertical: "center", horizontal: "right" }
      };
    }

    function exportarExcel() {
      if (!ultimaPivot) {
        alert("Primero carga la información.");
        return;
      }

      if (typeof XLSX === "undefined") {
        alert("No se pudo cargar la librería de Excel. Revisa conexión a internet.");
        return;
      }

      const {
        columnas,
        rows,
        totalInvPorFecha,
        totalTransPorFecha,
        totalVtaPorFecha,
        totalInvGeneral,
        totalVtaGeneral,
        totalNetoGeneral
      } = ultimaPivot;

      const header = [
        "codigo",
        "descripcion",
        ...columnas.map(c => `${c.fecha}_${c.tipo}`),
        "total_inv",
        "total_vta",
        "teorico_neto"
      ];

      const data = [header];

      for (const row of rows) {
        data.push([
          row.codigo,
          row.descripcion || "",
          ...columnas.map(col => {
            if (col.tipo === "INV") return row.invPorFecha[col.fecha] || "";
            if (col.tipo === "TRANS") return row.transPorFecha[col.fecha] || "";
            return row.vtaPorFecha[col.fecha] || "";
          }),
          row.totalInv || 0,
          row.totalVta || 0,
          row.neto || 0
        ]);
      }

      data.push([
        "TOTAL",
        "Suma por fecha",
        ...columnas.map(col => {
          if (col.tipo === "INV") return totalInvPorFecha[col.fecha] || 0;
          if (col.tipo === "TRANS") return totalTransPorFecha[col.fecha] || 0;
          return totalVtaPorFecha[col.fecha] || 0;
        }),
        totalInvGeneral || 0,
        totalVtaGeneral || 0,
        totalNetoGeneral || 0
      ]);

      const ws = XLSX.utils.aoa_to_sheet(data);

      ws["!cols"] = [
        { wch: 16 },
        { wch: 42 },
        ...columnas.map(() => ({ wch: 16 })),
        { wch: 14 },
        { wch: 14 },
        { wch: 16 }
      ];

      const range = XLSX.utils.decode_range(ws["!ref"]);
      const totalRowIndex = data.length - 1;

      for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          if (!ws[addr]) continue;

          let tipo = "";
          let bold = false;

          if (R === 0) {
            tipo = "HEAD";
            bold = true;
          } else if (R === totalRowIndex) {
            tipo = "TOTAL";
            bold = true;
          } else if (C >= 2 && C < 2 + columnas.length) {
            tipo = columnas[C - 2].tipo;
          } else if (C === header.length - 1) {
            tipo = "NETO";
            bold = true;
          } else if (C >= header.length - 3) {
            tipo = "TOTAL";
          }

          ws[addr].s = excelCellStyle(tipo, bold);

          if (C === 0 || C === 1) {
            ws[addr].s.alignment = { horizontal: "left", vertical: "center" };
          }

          if (C >= 2) {
            ws[addr].z = "#,##0.00";
          }
        }
      }

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Inventario_vs_Ventas");

      XLSX.writeFile(
        wb,
        `inventario_vs_ventas_${getTiendaActual()}_${Date.now()}.xlsx`
      );
    }

    $("btnCargar").addEventListener("click", cargarTodo);
    $("btnExportar").addEventListener("click", exportarExcel);

    window.addEventListener("load", async () => {
      $("tituloTienda").textContent = getTiendaActual();
      await cargarTodo();
    });
  </script>
</body>
</html>
