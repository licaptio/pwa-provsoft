<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor de Transferencia - PROVSOFT</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 16px;
      color: #00416A;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .box {
      background: #eef5ff;
      border-radius: 10px;
      padding: 12px;
    }

    .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .value {
      font-size: 15px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      background: white;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #0c6cbd;
      color: white;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e5f3ff;
      color: #0c6cbd;
      font-size: 12px;
      font-weight: bold;
    }

    .acciones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .btn {
      text-decoration: none;
      background: #00416A;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      display: inline-block;
    }

    .estado {
      margin-top: 10px;
      color: #374151;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="acciones">
      <a class="btn" href="transferencias_lista.html">← Volver al listado</a>
    </div>

    <div class="card">
      <h1>Visor de Transferencia</h1>
      <div class="estado" id="estado">Cargando...</div>

      <div class="grid" id="resumen" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Detalle del carrito</h2>
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Código</th>
              <th>Producto</th>
              <th>Cantidad</th>
              <th>Precio Público</th>
              <th>Importe</th>
              <th>Origen</th>
            </tr>
          </thead>
          <tbody id="tablaCarrito"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">JSON crudo</h2>
      <pre id="jsonCrudo"></pre>
    </div>
  </div>

  <script>
    // =========================
    // CONFIG FIREBASE
    // =========================
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT.firebaseapp.com",
      projectId: "TU_PROJECT_ID",
      storageBucket: "TU_PROJECT.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const estado = document.getElementById("estado");
    const resumen = document.getElementById("resumen");
    const tablaCarrito = document.getElementById("tablaCarrito");
    const jsonCrudo = document.getElementById("jsonCrudo");

    function qs(nombre) {
      return new URLSearchParams(window.location.search).get(nombre) || "";
    }

    function money(valor) {
      return new Intl.NumberFormat("es-MX", {
        style: "currency",
        currency: "MXN"
      }).format(Number(valor || 0));
    }

    function fechaMx(valor) {
      if (!valor) return "-";
      try {
        if (valor.toDate) return valor.toDate().toLocaleString("es-MX");
        return new Date(valor).toLocaleString("es-MX");
      } catch {
        return String(valor);
      }
    }

    function esc(texto) {
      if (texto == null) return "";
      return String(texto)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function box(label, value) {
      return `
        <div class="box">
          <div class="label">${esc(label)}</div>
          <div class="value">${value}</div>
        </div>
      `;
    }

    async function cargarTransferencia() {
      const sucursal = qs("sucursal");
      const folio = qs("folio");

      if (!sucursal || !folio) {
        estado.textContent = "Faltan parámetros. Usa ?sucursal=ALLENDE%201&folio=SOL-20260329-081404";
        return;
      }

      try {
        const docRef = db
          .collection("TIENDAS")
          .doc(sucursal)
          .collection("transferencias1")
          .doc(folio);

        const docSnap = await docRef.get();

        if (!docSnap.exists) {
          estado.textContent = "No se encontró la transferencia.";
          return;
        }

        const data = docSnap.data() || {};
        const carrito = Array.isArray(data.carrito) ? data.carrito : [];

        estado.textContent = "Transferencia cargada correctamente.";

        resumen.innerHTML = `
          ${box("Folio", esc(data.folio || folio))}
          ${box("Sucursal", esc(data.sucursal || sucursal))}
          ${box("Estatus", `<span class="badge">${esc(data.estatus || "-")}</span>`)}
          ${box("Fecha solicitud", esc(fechaMx(data.fechaSolicitud)))}
          ${box("Origen", esc(data.origen || "-"))}
          ${box("Partidas", Number(data.totalPartidas || carrito.length || 0))}
          ${box("Piezas", Number(data.totalPiezas || 0))}
          ${box("Observaciones", esc(data.observaciones || ""))}
        `;

        tablaCarrito.innerHTML = "";

        let totalImporte = 0;

        carrito.forEach((item, index) => {
          const cantidad = Number(item.cantidad || 0);
          const precio = Number(item.precioPublico || 0);
          const importe = cantidad * precio;
          totalImporte += importe;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${esc(item.codigo || "")}</td>
            <td>${esc(item.nombre || "")}</td>
            <td>${cantidad}</td>
            <td>${money(precio)}</td>
            <td>${money(importe)}</td>
            <td>${esc(item.origen || "")}</td>
          `;
          tablaCarrito.appendChild(tr);
        });

        const trTotal = document.createElement("tr");
        trTotal.innerHTML = `
          <td colspan="5" style="text-align:right;"><strong>Total estimado</strong></td>
          <td><strong>${money(totalImporte)}</strong></td>
          <td></td>
        `;
        tablaCarrito.appendChild(trTotal);

        jsonCrudo.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        console.error(error);
        estado.textContent = "Error al cargar: " + error.message;
      }
    }

    cargarTransferencia();
  </script>
</body>
</html>
