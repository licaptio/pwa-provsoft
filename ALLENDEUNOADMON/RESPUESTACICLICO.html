<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador Solicitudes Cíclicas - PROVSOFT</title>

  <style>
    :root {
      --azul:#00416A;
      --azul2:#0c6cbd;
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#dce3ec;
      --txt:#1f2937;
      --muted:#6b7280;
      --ok:#0f9d58;
      --bad:#dc2626;
      --warn:#d97706;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--txt);
    }

    header {
      background:linear-gradient(135deg,var(--azul),var(--azul2));
      color:white;
      padding:16px;
    }

    header h1 {
      margin:0;
      font-size:23px;
    }

    header small {
      opacity:.9;
    }

    .wrap {
      padding:16px;
      display:grid;
      grid-template-columns:360px 1fr;
      gap:16px;
      height:calc(100vh - 78px);
    }

    .panel {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      overflow:hidden;
    }

    .tools {
      padding:12px;
      border-bottom:1px solid var(--line);
      display:grid;
      gap:8px;
    }

    input, select, button {
      width:100%;
      padding:10px;
      border:1px solid var(--line);
      border-radius:10px;
      font-size:14px;
    }

    button {
      background:var(--azul2);
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover {
      opacity:.9;
    }

    .lista {
      overflow:auto;
      max-height:calc(100vh - 245px);
    }

    .item {
      padding:12px;
      border-bottom:1px solid var(--line);
      cursor:pointer;
    }

    .item:hover, .item.active {
      background:#eef6ff;
    }

    .folio {
      font-weight:bold;
      color:var(--azul);
      font-size:14px;
    }

    .small {
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
    }

    .detalle {
      padding:16px;
      overflow:auto;
      height:100%;
    }

    .detalle h2 {
      margin-top:0;
      color:var(--azul);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:10px;
      margin-bottom:16px;
    }

    .kpi {
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      font-size:13px;
    }

    .kpi b {
      display:block;
      font-size:20px;
      margin-top:4px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      border-bottom:1px solid var(--line);
      padding:8px;
      text-align:left;
      font-size:13px;
      vertical-align:top;
    }

    th {
      background:#f1f5f9;
      position:sticky;
      top:0;
      z-index:1;
    }

    .diff-ok { color:var(--ok); font-weight:bold; }
    .diff-bad { color:var(--bad); font-weight:bold; }
    .diff-warn { color:var(--warn); font-weight:bold; }

    .badge {
      padding:3px 7px;
      border-radius:999px;
      font-size:11px;
      font-weight:bold;
      display:inline-block;
    }

    .badge-fijo {
      background:#e0f2fe;
      color:#0369a1;
    }

    .badge-manual {
      background:#fef3c7;
      color:#92400e;
    }

    .firma {
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:12px;
      background:white;
      padding:12px;
      max-width:520px;
    }

    .firma img {
      max-width:100%;
      border:1px dashed var(--line);
      border-radius:8px;
      background:white;
    }

    .empty {
      padding:30px;
      color:var(--muted);
      text-align:center;
    }

    .error {
      color:var(--bad);
      padding:16px;
    }

    @media(max-width:950px) {
      .wrap {
        grid-template-columns:1fr;
        height:auto;
      }

      .lista {
        max-height:320px;
      }

      .grid {
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>

<body>
<header>
  <h1>Solicitudes Cíclicas - PROVSOFT</h1>
  <small>TIENDAS / ALLENDE 1 / ciclicos_respuesta</small>
</header>

<div class="wrap">
  <section class="panel">
    <div class="tools">
      <select id="sucursal">
        <option value="ALLENDE 1">ALLENDE 1</option>
      </select>

      <input id="buscar" placeholder="Buscar folio, persona o sucursal..." />
      <input id="fecha" type="date" />

      <button id="btnActualizar">Actualizar</button>
    </div>

    <div id="lista" class="lista">
      <div class="empty">Cargando solicitudes...</div>
    </div>
  </section>

  <section class="panel">
    <div id="detalle" class="detalle">
      <div class="empty">Selecciona una solicitud</div>
    </div>
  </section>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  limit,
  addDoc,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "inventariopv-643f1.firebaseapp.com",
    projectId: "inventariopv-643f1",
    storageBucket: "inventariopv-643f1.firebasestorage.app",
    messagingSenderId: "96242533231",
    appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let solicitudes = [];
  let solicitudActivaId = null;

  const lista = document.getElementById("lista");
  const detalle = document.getElementById("detalle");
  const buscar = document.getElementById("buscar");
  const fecha = document.getElementById("fecha");
  const sucursal = document.getElementById("sucursal");
  const btnActualizar = document.getElementById("btnActualizar");

function refSolicitudes() {
  return collection(
    db,
    "TIENDAS",
    sucursal.value,
    "ciclicos_respuesta"
  );
}

function refAjustes() {
  return collection(
    db,
    "TIENDAS",
    sucursal.value,
    "ajustes_inventario"
  );
}
async function obtenerAjustes(solicitudId) {

  const q = query(
    refAjustes(),
    where("solicitud_id", "==", solicitudId)
  );

  const snap = await getDocs(q);

  let ajustes = [];

  snap.forEach(doc => {
    ajustes.push(doc.data());
  });

  return ajustes;
}
  async function cargarSolicitudes() {
    lista.innerHTML = `<div class="empty">Cargando solicitudes...</div>`;
    detalle.innerHTML = `<div class="empty">Selecciona una solicitud</div>`;
    solicitudActivaId = null;

    try {
      const q = query(
        refSolicitudes(),
        orderBy("creado_en", "desc"),
        limit(100)
      );

      const snap = await getDocs(q);

      solicitudes = snap.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      renderLista();

    } catch (err) {
      console.error(err);
      lista.innerHTML = `
        <div class="error">
          Error cargando solicitudes:<br><br>
          ${escapeHtml(err.message)}
        </div>
      `;
    }
  }

  function renderLista() {
    const textoBuscar = buscar.value.toLowerCase().trim();
    const fechaFiltro = fecha.value;

    let data = solicitudes.filter(s => {
      const texto = [
        s.id,
        s.folio_solicitud,
        s.folio_respuesta,
        s.sucursal,
        s.respondido_por,
        s.generado_por
      ].join(" ").toLowerCase();

      const pasaTexto = !textoBuscar || texto.includes(textoBuscar);
      const pasaFecha = !fechaFiltro ||
        s.fecha_solicitud === fechaFiltro ||
        s.fecha_respuesta === fechaFiltro;

      return pasaTexto && pasaFecha;
    });

    if (!data.length) {
      lista.innerHTML = `<div class="empty">Sin solicitudes encontradas</div>`;
      return;
    }

    lista.innerHTML = data.map(s => `
      <div class="item ${s.id === solicitudActivaId ? "active" : ""}" data-id="${s.id}">
        <div class="folio">${escapeHtml(s.folio_solicitud || s.id)}</div>
        <div>${escapeHtml(s.sucursal || sucursal.value)}</div>
        <div class="small">
          Respuesta: ${escapeHtml(s.folio_respuesta || "-")}
        </div>
        <div class="small">
          Solicitud: ${escapeHtml(s.fecha_solicitud || "-")}
          | Respuesta: ${escapeHtml(s.fecha_respuesta || "-")}
        </div>
        <div class="small">
          Respondió: ${escapeHtml(s.respondido_por || "-")}
        </div>
      </div>
    `).join("");

    document.querySelectorAll(".item").forEach(item => {
      item.addEventListener("click", () => abrirSolicitud(item.dataset.id));
    });
  }

  async function abrirSolicitud(id) {
    solicitudActivaId = id;
    renderLista();

    const s = solicitudes.find(x => x.id === id);
    if (!s) return;

    const productos = Array.isArray(s.productos) ? s.productos : [];
    const ajustes = await obtenerAjustes(id);

    let totalProductos = productos.length;
    let iguales = 0;
    let sobrantes = 0;
    let faltantes = 0;
    let diferenciaTotal = 0;

    productos.forEach(p => {
      const fisico = Number(p.conteo_fisico || 0);
      const calc = Number(p.inventario_calculado || 0);
      const diff = fisico - calc;

      diferenciaTotal += diff;

      if (diff === 0) iguales++;
      else if (diff > 0) sobrantes++;
      else faltantes++;
    });

    detalle.innerHTML = `
      <h2>${escapeHtml(s.folio_solicitud || "Solicitud")}</h2>

      <p class="small">
        <b>Documento:</b> ${escapeHtml(s.id)}<br>
        <b>Folio respuesta:</b> ${escapeHtml(s.folio_respuesta || "-")}<br>
        <b>Sucursal:</b> ${escapeHtml(s.sucursal || sucursal.value)}<br>
        <b>Generado por:</b> ${escapeHtml(s.generado_por || "-")}<br>
        <b>Respondido por:</b> ${escapeHtml(s.respondido_por || "-")}<br>
        <b>Fecha solicitud:</b> ${escapeHtml(s.fecha_solicitud || "-")} |
        <b>Fecha respuesta:</b> ${escapeHtml(s.fecha_respuesta || "-")}
      </p>

      <div class="grid">
        <div class="kpi">Productos <b>${totalProductos}</b></div>
        <div class="kpi">Iguales <b>${iguales}</b></div>
        <div class="kpi">Sobrantes <b>${sobrantes}</b></div>
        <div class="kpi">Faltantes <b>${faltantes}</b></div>
        <div class="kpi">Dif. total <b>${redondear(diferenciaTotal)}</b></div>
      </div>

      ${s.observaciones_generales ? `
        <div class="kpi" style="margin-bottom:16px;">
          Observaciones generales:
          <b style="font-size:15px;">${escapeHtml(s.observaciones_generales)}</b>
        </div>
      ` : ""}

      <h3>Productos capturados</h3>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Código</th>
      <th>Descripción</th>
      <th>Tipo</th>
      <th>Conteo físico</th>
      <th>Fecha</th>
      <th>Ajuste</th>
      <th>Fecha ajuste</th>
    </tr>
  </thead>
  <tbody>
    ${productos.map((p, i) => {
      const ajusteGuardado = ajustes.find(a =>
  String(a.codigo) === String(p.codigo)
);

      const fisico = Number(p.conteo_fisico || 0);
      const tipo = p.tipo || "";
      const badgeClass = tipo === "MANUAL" ? "badge-manual" : "badge-fijo";

      return `
        <tr>
          <td>${p.orden ?? i + 1}</td>
          <td>${escapeHtml(p.codigo || "")}</td>
          <td>${escapeHtml(p.descripcion || "")}</td>
          <td><span class="badge ${badgeClass}">${escapeHtml(tipo)}</span></td>
          <td>${redondear(fisico)}</td>
          <td>${formatearHora(p.hora_registro)}</td>

          <td>
<input 
  type="number" 
  step="any"
  class="input-ajuste"
  data-index="${i}"
  value="${ajusteGuardado ? ajusteGuardado.captura_usuario : ''}"
/>
          </td>

          <td id="fecha-${i}">
  ${ajusteGuardado ? formatearHora(ajusteGuardado.fecha_ajuste) : "-"}
</td>
        </tr>
      `;
    }).join("")}
  </tbody>
</table>

      ${s.firma ? `
        <div class="firma">
          <h3>Firma</h3>
          <img src="${s.firma}" alt="Firma de respuesta" />
        </div>
      ` : ""}
    `;
    setTimeout(() => {
  document.querySelectorAll(".input-ajuste").forEach(input => {

    input.addEventListener("change", async (e) => {
      const index = e.target.dataset.index;
      const valor = Number(e.target.value || 0);
      const producto = productos[index];

      const fisico = Number(producto.conteo_fisico || 0);
      const diferencia = fisico - valor;

      const ahora = new Date();

      // pintar fecha
      document.getElementById(`fecha-${index}`).innerText =
        ahora.toLocaleString("es-MX");

      try {

await addDoc(refAjustes(), {
  solicitud_id: solicitudActivaId,
  codigo: producto.codigo || "",
  descripcion: producto.descripcion || "",
  tipo: producto.tipo || "",

  conteo_fisico: fisico,
  captura_usuario: valor,

  ajuste: diferencia, // 👈 ESTE ES EL MOVIMIENTO REAL

  tipo_movimiento: "AJUSTE", // 🔥 NUEVO

  fecha_ajuste: ahora,
  sucursal: sucursal.value,
  usuario: "sistema"
});
        console.log("Ajuste guardado");

      } catch (err) {
        console.error(err);
        alert("Error al guardar");
      }

    });

  });
}, 200);
  }
async function cargarAjustes() {
  const snap = await db
    .collection("TIENDAS")
    .doc(SUCURSAL)
    .collection("ajustes_inventario")
    .get();

  const docs = [];

  snap.forEach(doc => {
    const d = doc.data();

    docs.push({
      codigo: String(d.codigo || ""),
      codigoKey: normalizarCodigo(d.codigo),
      descripcion: d.descripcion || "",
      cantidad: Number(d.ajuste || 0) // 👈 CLAVE
    });
  });

  return docs;
}
  function redondear(n) {
    const num = Number(n || 0);
    return Number.isInteger(num) ? num : num.toFixed(2);
  }

  function formatearHora(valor) {
    if (!valor) return "-";

    try {
      const d = new Date(valor);
      if (isNaN(d.getTime())) return escapeHtml(valor);

      return d.toLocaleString("es-MX", {
        dateStyle: "short",
        timeStyle: "short"
      });
    } catch {
      return escapeHtml(valor);
    }
  }

  function escapeHtml(text) {
    return String(text ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  buscar.addEventListener("input", renderLista);
  fecha.addEventListener("change", renderLista);
  sucursal.addEventListener("change", cargarSolicitudes);
  btnActualizar.addEventListener("click", cargarSolicitudes);

  cargarSolicitudes();
</script>
</body>
</html>
