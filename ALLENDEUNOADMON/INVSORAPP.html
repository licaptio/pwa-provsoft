<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Revision Productos</title>

<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>
*{
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* 🔥 BODY MÁS PRO */
body{
  margin:0;
  min-height:100vh;
  padding-top:90px;

  background: radial-gradient(circle at top, #1e293b, #020617 70%);
  color:white;
}

/* 🔥 HEADER BIEN HECHO */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:100;

  background:linear-gradient(90deg,#dc2626,#b91c1c);
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:600;

  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.sub{
  color:#38bdf8;
  font-size:13px;
}

/* 🔥 CENTRADO REAL */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:calc(100vh - 90px);
  width:100%;
}

#inicio{
  margin:auto;
}

/* 🔥 CARD PRO */
.card{
  text-align:center;
  background:rgba(30,41,59,.9);
  backdrop-filter:blur(10px);

  margin:20px auto;
  padding:30px;
  border-radius:24px;

  width:90%;
  max-width:420px;

  box-shadow:0 25px 60px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.05);
}

/* 🔥 INPUT */
.input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  border:none;
  background:#334155;
  color:white;
}

/* 🔥 BOTONES PRO */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;

  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
  font-weight:600;

  cursor:pointer;
  margin-top:10px;

  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(220,38,38,.5);
}

.btn.sec{
  background:linear-gradient(135deg,#0ea5e9,#0284c7);
}

/* 🔥 INVENTARIO FULL WIDTH */
#inventario{
  margin:10px auto 20px auto;
}

h3{
  margin-bottom:15px;
  font-size:18px;
  color:#e2e8f0;
}

/* 🔥 LISTA MÁS LIMPIA */
.item{
  display:grid;
  grid-template-columns: 100px 1fr 70px;
  align-items:center;

  padding:12px;
  border-radius:12px;
  margin:8px 0;

  background:#1e293b;
  transition:.2s;
}

.item{
  border:1px solid rgba(255,255,255,.04);
}

.item:hover{
  background:#334155;
}

/* código */
.codigo{
  font-weight:600;
  color:#38bdf8;
  font-size:13px;
}

/* descripción */
.descripcion{
  font-size:14px;
  text-align:left;
  padding:0 10px;
}

/* input */
.item input{
  background:#e5e7eb;
  color:#111;
}

/* canvas */
canvas{
  background:white;
  width:100%;
  height:200px;
  border-radius:12px;
  margin-top:10px;
}
body.inventario-activo .center{
  display:none;
}

@media (min-width: 768px){

  .item{
    grid-template-columns: 140px 1fr 100px;
    gap:10px;
  }

  .descripcion{
    white-space: nowrap;        /* 🔥 evita saltos */
    overflow: hidden;
    text-overflow: ellipsis;    /* 🔥 ... si no cabe */
  }

  #inventario{
    max-width:1100px;
  }

}

@media (min-width: 768px){

  canvas{
    height:300px;     /* 🔥 más alto */
  }

  #firma1Div,
  #firma2Div{
    max-width:600px;  /* 🔥 más ancho */
    padding:40px;
  }

}
canvas{
  margin-bottom:15px; /* 🔥 espacio con input */
}

#firma1Div .input,
#firma2Div .input{
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="header">

  TOMA DE INVENTARIO
  <div id="info" class="sub"></div>
</div>

<!-- LOGIN -->
<div class="center">
  <div id="login" class="card">

    <img src="logo.webp" style="
      width:260px;
      display:block;
      margin:0 auto 10px auto;
      object-fit:cover;
      transform: scale(1.4);
    ">

    <input id="usuario" class="input" placeholder="Usuario">
    <input id="password" class="input" type="password" placeholder="Contraseña">

    <button class="btn" onclick="login()">Entrar</button>

  </div>
</div>

<!-- INICIO -->
<div class="center">
  <div id="inicio" class="card" style="display:none">
    <button class="btn" onclick="iniciar()">Iniciar Inventario</button>
  </div>
</div>

<!-- INVENTARIO -->
<div id="inventario" class="card" style="display:none">
  <div id="contenido"></div>
  <button class="btn" onclick="siguiente()">Siguiente</button>
</div>

<!-- FIRMA ELABORO -->
<div id="firma1Div" class="card" style="display:none">
  <h3>Firma quien elaboró</h3>
<canvas id="firma1"></canvas>

<input id="nombreFirma1" class="input" placeholder="Nombre de quien elaboró">

<button class="btn sec" onclick="limpiarFirma1()">Limpiar</button>
  <button class="btn" onclick="irFirma2()">Continuar</button>
</div>

<!-- FIRMA AUTORIZA -->
<div id="firma2Div" class="card" style="display:none">
  <h3>Firma quien autoriza</h3>
<canvas id="firma2"></canvas>

<input id="nombreFirma2" class="input" placeholder="Nombre de quien autoriza">

<button class="btn sec" onclick="limpiarFirma2()">Limpiar</button>
  <button class="btn" onclick="guardarFinal()">Finalizar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1",
  storageBucket: "inventariopv-643f1.firebasestorage.app",
  messagingSenderId: "96242533231",
  appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 DOM */
const loginDiv = document.getElementById("login");
const inicioDiv = document.getElementById("inicio");
const inventarioDiv = document.getElementById("inventario");
const firma1Div = document.getElementById("firma1Div");
const firma2Div = document.getElementById("firma2Div");
const contenidoDiv = document.getElementById("contenido");
const infoDiv = document.getElementById("info");

let usuarioActual;
let inventario = [];
let fijos = [];
let aleatorios = [];
let tipo = "fijos";
let horaInicio = null;
let horaFin = null;

/* FIRMA */
let pad1;
let pad2;

/* LOGIN */
window.login = async function(){

  const user = document.getElementById("usuario").value;
  const pass = document.getElementById("password").value;

  const snap = await getDocs(collection(db,"usuarios_ruta"));

  snap.forEach(doc=>{
    const u = doc.data();
    if(u.usuario===user && u.password===pass && u.rol==="encargado bodega" && u.activo){
      usuarioActual = u;
    }
  });

  if(!usuarioActual){
    alert("Acceso denegado");
    return;
  }

  loginDiv.style.display = "none";
  loginDiv.parentElement.style.display = "none";
  inicioDiv.style.display = "block";
  // 🔥 RECUPERAR SI HAY INFO GUARDADA
  infoDiv.innerText = usuarioActual.nombre + " - " + usuarioActual.rutaId;
};

/* INICIAR */
window.iniciar = async function(){

 document.querySelector("#inicio button").innerText = "Cargando... ⏳";

const snap = await getDocs(
  collection(db,"TIENDAS",usuarioActual.rutaId,"inventario1")
);

inventario = [];

for (const docInv of snap.docs) {

  const itemsSnap = await getDocs(
    collection(db,"TIENDAS",usuarioActual.rutaId,"inventario1", docInv.id, "items")
  );

  itemsSnap.forEach(docItem => {
    inventario.push(docItem.data());
  });
}

console.log("Inventario final:", inventario);

  // 🔥 VALIDACIÓN
  if(inventario.length === 0){
    alert("No hay inventario cargado para esta sucursal");
    inicioDiv.style.display = "block";
    return;
  }

  fijos = inventario.filter(p => (p.descripcion||"").toLowerCase().includes("cigar"));

  aleatorios = inventario
    .filter(p => !(p.descripcion||"").toLowerCase().includes("cigar"))
    .sort(()=>0.5 - Math.random())
    .slice(0,10);

  fijos = fijos.map(p => ({ ...p, cantidad: 0 }));
  aleatorios = aleatorios.map(p => ({ ...p, cantidad: 0 }));

  inventarioDiv.style.display = "block";
  inicioDiv.style.display = "none";
  // 🔥 ESTA LÍNEA VA AQUÍ
document.body.classList.add("inventario-activo");

  tipo = "fijos";
  mostrar(fijos);
};

/* MOSTRAR */
function mostrar(lista){
  let html = `<h3>${tipo==="fijos"?"Artículos Fijos":"Artículos Aleatorios"}</h3>`;
  
  lista.forEach(p=>{
    html += `
    <div class="item">
      <span class="codigo">${p.codigo}</span>
      <span class="descripcion">${p.descripcion}</span>
      <input type="number" inputmode="numeric" value="${p.cantidad ? p.cantidad : 0}" min="0" 
id="${tipo}_${p.codigo}" 
oninput="guardarAuto('${tipo}', '${p.codigo}', this.value)">
    </div>`;
  });

  contenidoDiv.innerHTML = html;
}

/* SIGUIENTE */
window.siguiente = function(){

  if(tipo==="fijos"){
    guardarDatos(fijos,"fijos");
    tipo="aleatorios";
    mostrar(aleatorios);
  }else{
    guardarDatos(aleatorios,"aleatorios");
    inventarioDiv.style.display="none";
firma1Div.style.display="block";

requestAnimationFrame(() => {
  initFirmas();
});
  }
};

function initFirmas(){
  const canvas1 = document.getElementById("firma1");

  // SOLO firma 1 aquí
  pad1 = new SignaturePad(canvas1);

  setTimeout(() => {
    resizeCanvas(canvas1, pad1);

    pad1.minWidth = 1;
    pad1.maxWidth = 2.5;

  }, 100);
}

function resizeCanvas(canvas, pad) {
  const ratio = Math.max(window.devicePixelRatio || 1, 1);

  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  canvas.getContext("2d").scale(ratio, ratio);

  pad.clear(); // importante para evitar distorsión
}

window.limpiarFirma1 = function(){
  if(pad1){
    pad1.clear();
  }
};

window.limpiarFirma2 = function(){
  if(pad2){
    pad2.clear();
  }
};
window.addEventListener("resize", () => {
  if(pad1) resizeCanvas(document.getElementById("firma1"), pad1);
  if(pad2) resizeCanvas(document.getElementById("firma2"), pad2);
});

/* GUARDAR DATOS */
function guardarDatos(lista,t){
  lista.forEach(p=>{
    const val = document.getElementById(`${t}_${p.codigo}`).value;
    p.cantidad = Number(val || 0);
  });

  // 🔥 GUARDAR EN LOCALSTORAGE
  localStorage.setItem("inventario_temp", JSON.stringify({
    fijos,
    aleatorios,
    tipo,
    horaInicio
  }));
}
window.guardarAuto = function(tipoInput, codigo, valor){

  const lista = tipoInput === "fijos" ? fijos : aleatorios;

  const item = lista.find(p => p.codigo == codigo);

  if(item){
    item.cantidad = Number(valor || 0);
  }

  localStorage.setItem("inventario_temp", JSON.stringify({
    fijos,
    aleatorios,
    tipo,
    horaInicio
  }));
};
/* FIRMA 2 */
window.irFirma2 = function(){

  if(pad1.isEmpty()){
    alert("Falta firma elaboró");
    return;
  }

  firma1Div.style.display="none";
  firma2Div.style.display="block";

  pad2 = new SignaturePad(document.getElementById("firma2"));

  setTimeout(() => {
    resizeCanvas(document.getElementById("firma2"), pad2);

    pad2.minWidth = 1;
    pad2.maxWidth = 2.5;

  }, 100);
};

/* GUARDAR FINAL */
window.guardarFinal = async function(){

  if(pad2.isEmpty()){
    alert("Falta firma autoriza");
    return;
  }

  horaFin = new Date().toLocaleString('sv-SE');
  const now = new Date();
const nombre1 = document.getElementById("nombreFirma1").value.trim();
const nombre2 = document.getElementById("nombreFirma2").value.trim();

if(!nombre1){
  alert("Falta nombre de quien elaboró");
  return;
}

if(!nombre2){
  alert("Falta nombre de quien autoriza");
  return;
}

  await addDoc(collection(db,"TIENDAS",usuarioActual.rutaId,"ciclicos"),{
    fecha: now.toISOString().split("T")[0],
    hora: now.toTimeString().split(" ")[0],
    hora_inicio: horaInicio,
    hora_fin: horaFin,
    usuario: usuarioActual.nombre,
    sucursal: usuarioActual.rutaId,
    fijos: fijos.map(p=>({codigo:p.codigo,descripcion:p.descripcion,cantidad:p.cantidad||0})),
    aleatorios: aleatorios.map(p=>({codigo:p.codigo,descripcion:p.descripcion,cantidad:p.cantidad||0})),
    firma_elaboro: pad1.toDataURL(),
    firma_autorizo: pad2.toDataURL(),
    firma_elaboro_nombre: nombre1,
    firma_autorizo_nombre: nombre2,    
  
  });

  localStorage.removeItem("inventario_temp");
  alert("Inventario guardado 🔥");
  location.reload();
};

</script>

</body>
</html>
