<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Productos PROVSOFT</title>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  margin:0;
  padding:10px;
}

.container{
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  border-radius:16px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.1);
}

h1{
  font-size:18px;
  margin:0 0 5px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
  font-size:16px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:8px;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
}

.btn-scan{ background:#0c6cbd; color:white; }
.btn-clear{ background:#e5e7eb; }

.precio{
  font-size:36px;
  color:#0c6cbd;
  font-weight:bold;
  text-align:center;
}

.video-box{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Consulta Productos</h1>

    <input id="input" placeholder="Escanea o escribe código">

    <button class="btn btn-scan" id="scanBtn">📷 Escanear</button>
    <button class="btn btn-clear" id="clearBtn">🧹 Limpiar búsqueda</button>

  </div>

  <div class="card">
    <strong>PRODUCTO</strong>
    <div id="producto">SIN DATOS</div>
  </div>

  <div class="card">
    <strong>PRECIO PÚBLICO</strong>
    <div class="precio" id="precio">$---</div>
  </div>

  <div class="card">
    <strong>COSTOS Y MÁRGENES</strong>
    <div id="costos"></div>
  </div>

</div>

<div class="video-box" id="videoBox">
  <video id="video" autoplay playsinline></video>
</div>

<script>
let catalogo = [
  {codigo:"7501234567890", nombre:"COCA COLA 600ML", precio:18, costo:12},
  {codigo:"7500000000001", nombre:"SABRITAS", precio:20, costo:13}
];

const input = document.getElementById("input");
const producto = document.getElementById("producto");
const precio = document.getElementById("precio");
const costos = document.getElementById("costos");

const videoBox = document.getElementById("videoBox");
const video = document.getElementById("video");

let detector;

async function initScanner(){
  if(!("BarcodeDetector" in window)){
    alert("No soporta escáner. Usa Chrome Android.");
    return;
  }

  detector = new BarcodeDetector({formats:["ean_13","code_128"]});

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;
  videoBox.style.display = "block";

  scanLoop();
}

async function scanLoop(){
  if(!detector) return;

  try{
    const codes = await detector.detect(video);

    if(codes.length){
      const code = codes[0].rawValue;
      stopScanner();

      input.value = code;
      buscar(code);
      return;
    }
  }catch(e){}

  requestAnimationFrame(scanLoop);
}

function stopScanner(){
  videoBox.style.display = "none";
  let stream = video.srcObject;
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
}

function buscar(codigo){
  let p = catalogo.find(x => x.codigo == codigo);

  if(!p){
    producto.innerText = "NO ENCONTRADO";
    precio.innerText = "$0.00";
    costos.innerHTML = "";
    return;
  }

  producto.innerText = p.nombre;
  precio.innerText = "$" + p.precio.toFixed(2);

  let margen = ((p.precio - p.costo)/p.costo)*100;

  costos.innerHTML = `
    Costo: $${p.costo}<br>
    Margen: ${margen.toFixed(2)}%
  `;
}

document.getElementById("scanBtn").onclick = initScanner;

document.getElementById("clearBtn").onclick = () => {
  input.value = "";
  producto.innerText = "SIN DATOS";
  precio.innerText = "$---";
  costos.innerHTML = "";
};

input.addEventListener("input", () => {
  buscar(input.value.trim());
});
</script>

</body>
</html>
