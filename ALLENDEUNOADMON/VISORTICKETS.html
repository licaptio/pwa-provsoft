<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

h1{text-align:center;}

.filtros{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input,button{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  color:black;
}

th,td{
  padding:8px;
  border:1px solid #ddd;
}

th{
  background:#1e293b;
  color:white;
}

/* Descripción más limpia */
td:nth-child(5){
  max-width:250px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>

<body>

<h1>Ventas ALLENDE 1</h1>

<div class="filtros">
  <input type="date" id="fecha">
  <input type="text" id="codigo" placeholder="Código producto">
  <input type="text" id="busqueda" placeholder="Buscar código o descripción">
  
  <button onclick="cargar()">Buscar</button>
  <button onclick="eliminarPorFecha()">Eliminar Fecha</button>
  <button onclick="eliminarPorProducto()">Eliminar Producto</button>
</div>

<table>
<thead>
<tr>
  <th>ID</th>
  <th>Fecha</th>
  <th>Ticket</th>
  <th>Código</th>
  <th>Descripción</th>
  <th>Cantidad</th>
  <th>Total</th>
  <th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<script>

// 🔥 CONFIG (usa tu API real)
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let dataActual = [];

// 🔍 CARGAR DATOS
async function cargar(){

  const fechaInput = document.getElementById("fecha").value;
  const codigo = document.getElementById("codigo").value;
  const busqueda = document.getElementById("busqueda").value.toLowerCase();

  const snapshot = await db
    .collection("TIENDAS")
    .doc("ALLENDE 1")
    .collection("ventas")
    .get();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";
  dataActual = [];

  snapshot.forEach(doc=>{
    const d = doc.data();

    let fechaOK = true;
    let codigoOK = true;
    let busquedaOK = true;

    // 🔹 FILTRO FECHA
    if(fechaInput){
      const f = fechaInput.split("-").reverse().join("/");
      fechaOK = d.Fecha === f;
    }

    // 🔹 FILTRO CODIGO
    if(codigo){
      codigoOK = d.Codigo == codigo;
    }

    // 🔍 BUSCADOR
    if(busqueda){
      const texto = (
        (d.Codigo || "") + " " + 
        (d.descripcion || "")
      ).toLowerCase();

      busquedaOK = texto.includes(busqueda);
    }

    if(fechaOK && codigoOK && busquedaOK){

      dataActual.push(doc.id);

      tabla.innerHTML += `
      <tr>
        <td>${doc.id}</td>
        <td>${d.Fecha}</td>
        <td>${d.Venta || ""}</td>
        <td>${d.Codigo}</td>
        <td>${d.descripcion || ""}</td>
        <td>${d["Cantidad vendida"]}</td>
        <td>${d["venta Total"]}</td>
        <td>
          <button onclick="eliminar('${doc.id}')">Eliminar</button>
        </td>
      </tr>
      `;
    }
  });
}

// ❌ ELIMINAR INDIVIDUAL
async function eliminar(id){
  if(!confirm("Eliminar venta?")) return;

  await db
    .collection("TIENDAS")
    .doc("ALLENDE 1")
    .collection("ventas")
    .doc(id)
    .delete();

  cargar();
}

// 🔥 ELIMINAR POR FECHA
async function eliminarPorFecha(){
  if(dataActual.length === 0){
    alert("No hay datos");
    return;
  }

  if(!confirm("Eliminar TODA la fecha?")) return;

  const batch = db.batch();

  dataActual.forEach(id=>{
    const ref = db
      .collection("TIENDAS")
      .doc("ALLENDE 1")
      .collection("ventas")
      .doc(id);

    batch.delete(ref);
  });

  await batch.commit();

  alert("Eliminadas");
  cargar();
}

// 🔥 ELIMINAR POR PRODUCTO
async function eliminarPorProducto(){
  if(dataActual.length === 0){
    alert("Primero busca datos");
    return;
  }

  if(!confirm("Eliminar producto filtrado?")) return;

  const batch = db.batch();

  dataActual.forEach(id=>{
    const ref = db
      .collection("TIENDAS")
      .doc("ALLENDE 1")
      .collection("ventas")
      .doc(id);

    batch.delete(ref);
  });

  await batch.commit();

  alert("Producto eliminado");
  cargar();
}

</script>

</body>
</html>
