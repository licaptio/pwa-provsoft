<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario Resumido Costeado - PROVSOFT</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --azul: #00416A;
      --azul2: #0c6cbd;
      --gris: #e5e7eb;
      --gris2: #f8fafc;
      --texto: #1f2937;
      --verde: #166534;
      --rojo: #991b1b;
      --naranja: #b45309;
      --shadow: 0 10px 28px rgba(0,0,0,.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: var(--texto);
    }

    .wrap {
      max-width: 100%;
      padding: 18px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      background: linear-gradient(135deg, var(--azul), var(--azul2));
      color: white;
      padding: 18px 20px;
    }

    .topbar h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .topbar p {
      margin: 0;
      opacity: .95;
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(160px, 1fr));
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--gris);
      background: #fff;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: bold;
      color: #475569;
    }

    .field input, .field button, .field select {
      height: 40px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 0 12px;
      font-size: 14px;
    }

    .field button {
      cursor: pointer;
      border: none;
      background: var(--azul);
      color: white;
      font-weight: bold;
    }

    .field button:hover {
      filter: brightness(1.05);
    }

    .field button.sec {
      background: #0f766e;
    }

    .field button.warn {
      background: var(--naranja);
    }

    .status {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--gris);
      background: var(--gris2);
    }

    .status.ok { color: var(--verde); }
    .status.error { color: var(--rojo); }
    .status.warn { color: var(--naranja); }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gris);
      background: #fff;
    }

    .pill {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 250px);
      background: white;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1200px;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #dbeafe;
      color: #0f172a;
    }

    th, td {
      border: 1px solid #dbe4f0;
      padding: 8px 10px;
      white-space: nowrap;
      text-align: right;
    }

    th.left, td.left {
      text-align: left;
    }

    .sticky1 {
      position: sticky;
      left: 0;
      z-index: 4;
      background: #fff;
      min-width: 140px;
      max-width: 140px;
    }

    .sticky2 {
      position: sticky;
      left: 140px;
      z-index: 4;
      background: #fff;
      min-width: 320px;
      max-width: 320px;
    }

    thead .sticky1,
    thead .sticky2,
    tfoot .sticky1,
    tfoot .sticky2 {
      background: #dbeafe;
    }

    .sticky3 {
      position: sticky;
      left: 460px;
      z-index: 4;
      background: #fff;
      min-width: 180px;
      max-width: 180px;
    }

    thead .sticky3,
    tfoot .sticky3 {
      background: #dbeafe;
    }

    td.num-zero {
      color: #94a3b8;
    }

    td.negativo {
      color: #b91c1c;
      font-weight: bold;
    }

    td.money {
      font-variant-numeric: tabular-nums;
    }

    td.costo-total {
      background: #ecfccb;
      font-weight: bold;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      background: #ecfdf5;
      font-weight: bold;
      z-index: 3;
    }

    @media (max-width: 1200px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <h1>Inventario Resumido Costeado - ALLENDE 1</h1>
        <p>Lee inventario, cruza contra catálogo de productos y guarda el catálogo en IndexedDB para no consultar Firebase a cada rato.</p>
      </div>

      <div class="controls">
        <div class="field">
          <label>Filtro código</label>
          <input type="text" id="filtroCodigo" placeholder="Ej. 010921" />
        </div>

        <div class="field">
          <label>Filtro descripción</label>
          <input type="text" id="filtroDescripcion" placeholder="Buscar descripción" />
        </div>

        <div class="field">
          <label>Filtro departamento</label>
          <input type="text" id="filtroDepartamento" placeholder="Ej. DULCES IVA" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="btnCargar">Cargar inventario</button>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <div style="display:flex; gap:10px;">
            <button id="btnActualizarCatalogo" class="warn" style="flex:1;">Actualizar catálogo</button>
            <button id="btnExportar" class="sec" style="flex:1;">Exportar CSV</button>
          </div>
        </div>
      </div>

      <div id="status" class="status">Esperando consulta...</div>
      <div id="summary" class="summary"></div>

      <div class="table-wrap">
        <table id="tablaResumen">
          <thead></thead>
          <tbody></tbody>
          <tfoot></tfoot>
        </table>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "inventariopv-643f1.firebaseapp.com",
      projectId: "inventariopv-643f1",
      storageBucket: "inventariopv-643f1.firebasestorage.app",
      messagingSenderId: "96242533231",
      appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();

    const INVENTARIOS_REF = db
      .collection("TIENDAS")
      .doc("ALLENDE 1")
      .collection("inventario1");

    const PRODUCTOS_REF = db.collection("productos");

    const $ = (id) => document.getElementById(id);

    const tabla = $("tablaResumen");
    const thead = tabla.querySelector("thead");
    const tbody = tabla.querySelector("tbody");
    const tfoot = tabla.querySelector("tfoot");

    let ultimoResumen = [];

    const IDB_NAME = "PROVSOFT_CACHE_DB";
    const IDB_VERSION = 1;
    const STORE_CATALOGO = "catalogo_productos";
    const STORE_META = "meta";
    const CATALOGO_KEY = "productos";
    const META_KEY = "catalogo_productos_meta";
    const CATALOGO_TTL_MS = 1000 * 60 * 60 * 12; // 12 horas

    function setStatus(msg, type = "") {
      const el = $("status");
      el.textContent = msg;
      el.className = "status " + type;
    }

    function fmtNum(n) {
      return Number(n || 0).toLocaleString("es-MX", {
        maximumFractionDigits: 2
      });
    }

    function fmtMoney(n) {
      return Number(n || 0).toLocaleString("es-MX", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function limpiarTabla() {
      thead.innerHTML = "";
      tbody.innerHTML = "";
      tfoot.innerHTML = "";
      $("summary").innerHTML = "";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizarFecha(valor) {
      if (!valor) return "";

      if (typeof valor === "string") {
        const v = valor.trim();

        const m1 = v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (m1) {
          const [, dd, mm, yyyy] = m1;
          return `${yyyy}-${mm}-${dd}`;
        }

        const m2 = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m2) {
          return `${m2[1]}-${m2[2]}-${m2[3]}`;
        }

        return v;
      }

      if (valor && typeof valor.toDate === "function") {
        const d = valor.toDate();
        return d.toISOString().slice(0, 10);
      }

      if (valor && typeof valor.seconds === "number") {
        const d = new Date(valor.seconds * 1000);
        return d.toISOString().slice(0, 10);
      }

      return String(valor).trim();
    }

    function normalizarCodigo(valor) {
      const s = String(valor ?? "").trim();
      if (!s) return "";

      const soloDigitos = s.replace(/\D/g, "");

      if (!soloDigitos) return s.toLowerCase();

      return soloDigitos.replace(/^0+/, "") || "0";
    }

    function abrirIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);

        req.onupgradeneeded = (e) => {
          const dbx = e.target.result;

          if (!dbx.objectStoreNames.contains(STORE_CATALOGO)) {
            dbx.createObjectStore(STORE_CATALOGO);
          }

          if (!dbx.objectStoreNames.contains(STORE_META)) {
            dbx.createObjectStore(STORE_META);
          }
        };

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbGet(storeName, key) {
      const dbx = await abrirIDB();

      return new Promise((resolve, reject) => {
        const tx = dbx.transaction(storeName, "readonly");
        const store = tx.objectStore(storeName);
        const req = store.get(key);

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbSet(storeName, key, value) {
      const dbx = await abrirIDB();

      return new Promise((resolve, reject) => {
        const tx = dbx.transaction(storeName, "readwrite");
        const store = tx.objectStore(storeName);
        const req = store.put(value, key);

        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    }

    async function guardarCatalogoEnCache(catalogoMap) {
      const arr = Array.from(catalogoMap.entries()).map(([codigoKey, item]) => ({
        codigoKey,
        ...item
      }));

      await idbSet(STORE_CATALOGO, CATALOGO_KEY, arr);
      await idbSet(STORE_META, META_KEY, {
        updatedAt: Date.now(),
        total: arr.length
      });
    }

    async function leerCatalogoDeCache() {
      const meta = await idbGet(STORE_META, META_KEY);
      const arr = await idbGet(STORE_CATALOGO, CATALOGO_KEY);

      if (!meta || !arr || !Array.isArray(arr)) {
        return {
          ok: false,
          motivo: "Sin catálogo en cache"
        };
      }

      const edadMs = Date.now() - Number(meta.updatedAt || 0);
      const vigente = edadMs <= CATALOGO_TTL_MS;

      const mapa = new Map();
      for (const item of arr) {
        mapa.set(item.codigoKey, {
          codigo: item.codigo || "",
          descripcion: item.descripcion || "",
          departamento: item.departamento || "",
          costo: Number(item.costo || 0)
        });
      }

      return {
        ok: true,
        vigente,
        updatedAt: meta.updatedAt || 0,
        total: meta.total || mapa.size,
        mapa
      };
    }

    async function descargarCatalogoDesdeFirebase() {
      setStatus("Descargando catálogo de productos desde Firebase...", "warn");

      const snap = await PRODUCTOS_REF.get();
      const mapa = new Map();

      snap.forEach(doc => {
        const data = doc.data() || {};
        const codigoOriginal = String(
          data.codigoBarra ??
          data.codigo ??
          doc.id ??
          ""
        ).trim();

        const codigoKey = normalizarCodigo(codigoOriginal);
        if (!codigoKey) return;

        const descripcion = String(
          data.concepto ??
          data.descripcion ??
          data.Descripcion ??
          ""
        ).trim();

        const departamento = String(
          data.departamento ??
          data.departamento_nombre ??
          ""
        ).trim();

        const costo = Number(
          data.costoSinImpuesto ??
          data.costo ??
          0
        );

        mapa.set(codigoKey, {
          codigo: codigoOriginal,
          descripcion,
          departamento,
          costo
        });
      });

      await guardarCatalogoEnCache(mapa);

      return mapa;
    }

    async function obtenerCatalogo({ forzar = false } = {}) {
      if (!forzar) {
        try {
          const cache = await leerCatalogoDeCache();

          if (cache.ok && cache.vigente) {
            setStatus(
              `Catálogo cargado desde IndexedDB. Productos: ${cache.total}.`,
              "ok"
            );
            return cache.mapa;
          }

          if (cache.ok && !cache.vigente) {
            setStatus(
              "El catálogo local existe pero ya venció. Se actualizará desde Firebase...",
              "warn"
            );
          }
        } catch (err) {
          console.warn("No se pudo leer cache:", err);
        }
      }

      const mapa = await descargarCatalogoDesdeFirebase();
      setStatus(`Catálogo actualizado desde Firebase. Productos: ${mapa.size}.`, "ok");
      return mapa;
    }

    async function cargarInventarios() {
      const foliosSnap = await INVENTARIOS_REF
        .orderBy(firebase.firestore.FieldPath.documentId(), "asc")
        .get();

      const docs = [];

      for (const folioDoc of foliosSnap.docs) {
        const itemsSnap = await folioDoc.ref.collection("items").get();

        itemsSnap.forEach(itemDoc => {
          const data = itemDoc.data() || {};

          const codigoOriginal = String(
            data.codigo ??
            data.Codigo ??
            ""
          ).trim();

          const descripcion = String(
            data.descripcion ??
            data.Descripcion ??
            ""
          ).trim();

          const fecha = normalizarFecha(
            data.fecha ??
            data.Fecha ??
            ""
          );

          const cantidad = Number(
            data.cantidad ??
            data.Cantidad ??
            0
          );

          docs.push({
            folio: folioDoc.id,
            id: itemDoc.id,
            codigo: codigoOriginal,
            codigoKey: normalizarCodigo(codigoOriginal),
            descripcion,
            fecha,
            cantidad
          });
        });
      }

      return {
        docs,
        totalFolios: foliosSnap.size
      };
    }

    function construirResumenCosteado(registros, catalogoMap) {
      const mapa = new Map();

      for (const item of registros) {
        const codigoKey = String(item.codigoKey || "").trim();
        if (!codigoKey) continue;

        const codigo = String(item.codigo || "").trim();
        const descripcionInv = String(item.descripcion || "").trim();
        const cantidad = Number(item.cantidad || 0);

        if (!mapa.has(codigoKey)) {
          const prod = catalogoMap.get(codigoKey) || {};

          mapa.set(codigoKey, {
            codigo: codigo || prod.codigo || "",
            descripcion: prod.descripcion || descripcionInv || "",
            departamento: prod.departamento || "",
            costo: Number(prod.costo || 0),
            cantidad: 0,
            costoTotal: 0
          });
        }

        const row = mapa.get(codigoKey);

        if (!row.codigo && codigo) row.codigo = codigo;
        if (!row.descripcion && descripcionInv) row.descripcion = descripcionInv;

        row.cantidad += cantidad;
        row.costoTotal = row.cantidad * row.costo;
      }

      const rows = Array.from(mapa.values()).sort((a, b) => {
        const da = String(a.descripcion || "").trim();
        const db = String(b.descripcion || "").trim();

        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;

        return da.localeCompare(db, "es", { sensitivity: "base" });
      });

      return rows;
    }

    function aplicarFiltros(rows) {
      const filtroCodigo = $("filtroCodigo").value.trim().toLowerCase();
      const filtroDescripcion = $("filtroDescripcion").value.trim().toLowerCase();
      const filtroDepartamento = $("filtroDepartamento").value.trim().toLowerCase();

      return rows.filter(row => {
        const codigoVisible = String(row.codigo || "").toLowerCase();
        const codigoKey = normalizarCodigo(row.codigo || "").toLowerCase();
        const descripcion = String(row.descripcion || "").toLowerCase();
        const departamento = String(row.departamento || "").toLowerCase();

        const okCodigo = !filtroCodigo ||
          codigoVisible.includes(filtroCodigo) ||
          codigoKey.includes(filtroCodigo.replace(/\D/g, "").replace(/^0+/, "") || filtroCodigo);

        const okDescripcion = !filtroDescripcion || descripcion.includes(filtroDescripcion);
        const okDepartamento = !filtroDepartamento || departamento.includes(filtroDepartamento);

        return okCodigo && okDescripcion && okDepartamento;
      });
    }

    function pintarResumen(rows, meta = {}) {
      const totalCantidad = rows.reduce((acc, r) => acc + Number(r.cantidad || 0), 0);
      const totalCosto = rows.reduce((acc, r) => acc + Number(r.costoTotal || 0), 0);
      const sinCosto = rows.filter(r => Number(r.costo || 0) <= 0).length;
      const sinDepartamento = rows.filter(r => !String(r.departamento || "").trim()).length;

      $("summary").innerHTML = `
        <div class="pill">Folios inventario: ${fmtNum(meta.totalFolios || 0)}</div>
        <div class="pill">Registros leídos: ${fmtNum(meta.totalRegistros || 0)}</div>
        <div class="pill">Códigos únicos: ${fmtNum(rows.length)}</div>
        <div class="pill">Cantidad total: ${fmtNum(totalCantidad)}</div>
        <div class="pill">Costo total inventario: $${fmtMoney(totalCosto)}</div>
        <div class="pill">Sin costo: ${fmtNum(sinCosto)}</div>
        <div class="pill">Sin departamento: ${fmtNum(sinDepartamento)}</div>
      `;
    }

    function pintarTabla(rows) {
      limpiarTabla();

      const trHead = document.createElement("tr");
      trHead.innerHTML = `
        <th class="left sticky1">Código</th>
        <th class="left sticky2">Descripción</th>
        <th class="left sticky3">Departamento</th>
        <th>Costo</th>
        <th>Cantidad</th>
        <th>Costo total</th>
      `;
      thead.appendChild(trHead);

      const frag = document.createDocumentFragment();

      for (const row of rows) {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td class="left sticky1">${escapeHtml(row.codigo)}</td>
          <td class="left sticky2">${escapeHtml(row.descripcion || "")}</td>
          <td class="left sticky3">${escapeHtml(row.departamento || "")}</td>
          <td class="money ${Number(row.costo || 0) === 0 ? "num-zero" : ""}">${Number(row.costo || 0) === 0 ? "" : fmtMoney(row.costo)}</td>
          <td class="${Number(row.cantidad || 0) === 0 ? "num-zero" : ""}">${Number(row.cantidad || 0) === 0 ? "" : fmtNum(row.cantidad)}</td>
          <td class="money costo-total">${fmtMoney(row.costoTotal || 0)}</td>
        `;

        frag.appendChild(tr);
      }

      tbody.appendChild(frag);

      const totalCantidad = rows.reduce((acc, r) => acc + Number(r.cantidad || 0), 0);
      const totalCosto = rows.reduce((acc, r) => acc + Number(r.costoTotal || 0), 0);

      const trFoot = document.createElement("tr");
      trFoot.innerHTML = `
        <td class="left sticky1"><b>TOTAL</b></td>
        <td class="left sticky2"><b>Inventario resumido</b></td>
        <td class="left sticky3"></td>
        <td></td>
        <td><b>${fmtNum(totalCantidad)}</b></td>
        <td><b>${fmtMoney(totalCosto)}</b></td>
      `;
      tfoot.appendChild(trFoot);
    }

    function csvSafe(value) {
      const s = String(value ?? "").replace(/"/g, '""');
      return `"${s}"`;
    }

    function exportarCSV() {
      if (!ultimoResumen.length) {
        alert("Primero carga la información.");
        return;
      }

      const header = [
        "codigo",
        "descripcion",
        "departamento",
        "costo",
        "cantidad",
        "costo_total"
      ];

      const lines = [header.map(csvSafe).join(",")];

      for (const row of ultimoResumen) {
        lines.push([
          row.codigo,
          row.descripcion || "",
          row.departamento || "",
          Number(row.costo || 0),
          Number(row.cantidad || 0),
          Number(row.costoTotal || 0)
        ].map(csvSafe).join(","));
      }

      const totalCantidad = ultimoResumen.reduce((acc, r) => acc + Number(r.cantidad || 0), 0);
      const totalCosto = ultimoResumen.reduce((acc, r) => acc + Number(r.costoTotal || 0), 0);

      lines.push([
        "TOTAL",
        "Inventario resumido",
        "",
        "",
        totalCantidad,
        totalCosto
      ].map(csvSafe).join(","));

      const blob = new Blob(["\uFEFF" + lines.join("\n")], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `inventario_resumido_costeado_allende1_${Date.now()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function cargarTodo({ forzarCatalogo = false } = {}) {
      try {
        setStatus("Preparando consulta...", "warn");

        const [catalogoMap, inventariosData] = await Promise.all([
          obtenerCatalogo({ forzar: forzarCatalogo }),
          cargarInventarios()
        ]);

        setStatus("Procesando inventario...", "warn");

        if (!inventariosData.docs.length) {
          limpiarTabla();
          ultimoResumen = [];
          setStatus("No se encontraron registros de inventario.", "error");
          return;
        }

        let resumen = construirResumenCosteado(inventariosData.docs, catalogoMap);
        resumen = aplicarFiltros(resumen);

        if (!resumen.length) {
          limpiarTabla();
          ultimoResumen = [];
          setStatus("No hubo resultados con los filtros aplicados.", "error");
          return;
        }

        ultimoResumen = resumen;
        pintarTabla(resumen);
        pintarResumen(resumen, {
          totalFolios: inventariosData.totalFolios,
          totalRegistros: inventariosData.docs.length
        });

        setStatus(
          `Listo. Folios: ${inventariosData.totalFolios} | Registros: ${inventariosData.docs.length} | Códigos resumidos: ${resumen.length}`,
          "ok"
        );
      } catch (err) {
        console.error(err);
        setStatus("Error al consultar Firestore/IndexedDB: " + err.message, "error");
      }
    }

    $("btnCargar").addEventListener("click", () => cargarTodo({ forzarCatalogo: false }));
    $("btnActualizarCatalogo").addEventListener("click", () => cargarTodo({ forzarCatalogo: true }));
    $("btnExportar").addEventListener("click", exportarCSV);

    window.addEventListener("load", () => cargarTodo({ forzarCatalogo: false }));
  </script>
</body>
</html>
