<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>LOGIN | RUTA 2</title>

<style>

:root{
  --azul:#00416A;
  --azul2:#0c6cbd;
  --rojo:#991b1b;
  --bg:#f4f7fb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(rgba(255,255,255,.88),rgba(255,255,255,.88)),
    linear-gradient(135deg,var(--azul),#dbeafe);

  padding:20px;
}

.login-box{
  width:100%;
  max-width:420px;

  background:white;
  border-radius:24px;

  padding:35px;

  box-shadow:0 15px 40px rgba(0,0,0,.15);

  border:1px solid #e5e7eb;
}

.logo{
  width:120px;
  display:block;
  margin:auto;
  margin-bottom:20px;
}

h1{
  text-align:center;
  color:var(--rojo);
  margin-bottom:8px;
  font-size:30px;
  font-weight:900;
}

.sub{
  text-align:center;
  color:#4b5563;
  font-size:13px;
  margin-bottom:28px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:13px;
  font-weight:700;
  color:#374151;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #d1d5db;
  margin-bottom:18px;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:var(--azul2);
  box-shadow:0 0 0 3px rgba(12,108,189,.15);
}

button{
  width:100%;
  border:none;
  background:var(--rojo);
  color:white;

  padding:15px;

  border-radius:14px;

  font-size:15px;
  font-weight:900;

  cursor:pointer;

  transition:.2s;
}

button:hover{
  background:#7f1d1d;
}

#error{
  margin-top:16px;
  color:#dc2626;
  text-align:center;
  font-size:13px;
  font-weight:700;
}

.footer{
  margin-top:25px;
  text-align:center;
  color:#6b7280;
  font-size:11px;
}

.loading{
  opacity:.7;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="login-box">

  <img src="logo.jfif" class="logo">

  <h1>RUTA 2</h1>

  <div class="sub">
    PROVEEDORA DE DULCES Y DESECHABLES
  </div>

  <label>Correo</label>
  <input type="email" id="email" placeholder="usuario@empresa.com">

  <label>Contraseña</label>
  <input type="password" id="password" placeholder="********">

  <button onclick="login()" id="btnLogin">
    INICIAR SESIÓN
  </button>

  <div id="error"></div>

  <div class="footer">
    PROVSOFT · ACCESO RESTRINGIDO
  </div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- TU CONFIG -->
<script src="config.js"></script>

<script>

const auth = firebase.auth();

auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const btn = document.getElementById("btnLogin");
  const error = document.getElementById("error");

  error.innerText = "";

  if(!email || !password){

    error.innerText = "Completa correo y contraseña.";
    return;
  }

  btn.classList.add("loading");
  btn.innerText = "VALIDANDO...";

  try{

    await auth.signInWithEmailAndPassword(email,password);

    window.location.href = "indicemenur2asdsvarfhbwrtyn.html";

  }catch(err){

    console.error(err);

    error.innerText = "Usuario o contraseña incorrectos.";

  }

  btn.classList.remove("loading");
  btn.innerText = "INICIAR SESIÓN";
}

document.addEventListener("keydown",(e)=>{

  if(e.key==="Enter"){
    login();
  }

});

auth.onAuthStateChanged(user=>{

  if(user){

    window.location.href = "indicemenur2asdsvarfhbwrtyn.html";
  }

});

</script>

</body>
</html>
