<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pedidos Proveedora | PROVSOFT</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

/* =========================
   VARIABLES
========================= */

:root{
  --azul:#00416A;
  --azul2:#0c6cbd;
  --verde:#16a34a;
  --verde2:#22c55e;
  --gris:#eef2f7;
  --card:#ffffff;
  --texto:#1f2937;
  --shadow:0 10px 30px rgba(0,0,0,.10);
  --radius:18px;
}

/* =========================
   GENERAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#eef4fb,#f8fbff);
  color:var(--texto);
  min-height:100vh;
}

/* =========================
   HEADER
========================= */

.header{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  padding:22px;
  color:white;
  box-shadow:var(--shadow);
}

.header-content{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{
  width:70px;
  height:70px;
  background:white;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.header h1{
  font-size:30px;
  font-weight:bold;
}

.header p{
  opacity:.9;
  margin-top:4px;
}

/* =========================
   CONTENIDO
========================= */

.container{
  max-width:1100px;
  margin:25px auto;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:25px;
  box-shadow:var(--shadow);
}

/* =========================
   FOLIO
========================= */

.folio-box{
  background:linear-gradient(135deg,#00416A,#0c6cbd);
  color:white;
  padding:18px 22px;
  border-radius:18px;
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,65,106,.18);

  position:sticky;
  top:15px;
  z-index:20;
}

.folio-label{
  font-size:16px;
  opacity:.9;
  font-weight:bold;
}

.folio-number{
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  margin-bottom:20px;
}

/* =========================
   INPUTS
========================= */

.label{
  font-size:14px;
  font-weight:bold;
  margin-bottom:7px;
  display:block;
}

.input,
.textarea{
  width:100%;
  border:1px solid transparent;
  background:#f5f7fb;
  padding:14px;
  border-radius:14px;
  font-size:15px;
  outline:none;
  transition:.2s;
}

.input:focus,
.textarea:focus{
  background:white;
  border-color:#0c6cbd;
  box-shadow:0 0 0 3px rgba(12,108,189,.15);
}

.textarea{
  min-height:180px;
  resize:none;
  line-height:1.5;
}

/* =========================
   BOTONES
========================= */

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-top:25px;
}

.btn{
  border:none;
  padding:15px 22px;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
}

.btn-save{
  background:linear-gradient(135deg,var(--verde),var(--verde2));
  color:white;
}

.btn-history{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:white;
}

.btn-clear{
  background:#e5e7eb;
  color:#111827;
}

/* =========================
   MODAL
========================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal-content{
  width:100%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
  background:white;
  border-radius:22px;
  padding:25px;
  box-shadow:var(--shadow);
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close{
  background:#ef4444;
  color:white;
  border:none;
  width:40px;
  height:40px;
  border-radius:12px;
  cursor:pointer;
  font-size:18px;
}

/* =========================
   TABLA
========================= */

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:var(--azul);
  color:white;
  padding:14px;
  text-align:left;
}

td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
}

.reprint{
  background:var(--verde);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* =========================
   TICKET
========================= */

#ticket{
  display:none;
}

.ticket-print{
  width:58mm;
  font-family:Arial, sans-serif;
  color:#000;
  padding:6px 8px;
  font-size:13px;
  line-height:1.25;
}

.ticket-center{
  text-align:center;
}

.ticket-title{
  font-size:18px;
  font-weight:900;
  line-height:1.1;
  margin-bottom:6px;
}

.ticket-reprint{
  font-size:11px;
  font-weight:bold;
  margin-top:4px;
  margin-bottom:4px;
}

.ticket-divider{
  border-top:1px dashed #555;
  margin:6px 0;
}

.ticket-row{
  margin-bottom:4px;
  word-break:break-word;
  font-size:14px;
}

.ticket-section{
  margin-top:8px;
  margin-bottom:4px;
  font-weight:900;
  font-size:15px;
}

.ticket-text{
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.35;
  margin-bottom:4px;
}

.ticket-footer{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  font-weight:bold;
}

/* =========================
   IMPRESION
========================= */

@media print{

  @page{
    size:80mm auto;
    margin:0;
  }

  html,
  body{
    width:58mm;
    margin:0;
    padding:0;
    background:#fff;
  }

  body *{
    visibility:hidden;
  }

  #ticket,
  #ticket *{
    visibility:visible;
  }

#ticket{
    position:absolute;
    left:50%;
    top:0;
    transform:translateX(-50%);
    width:58mm;
    background:#fff;
    margin:0 auto;
    padding:0;
}

}

</style>
</head>
<body>

<!-- HEADER -->

<div class="header">

  <div class="header-content">

    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png">
    </div>

    <div>
      <h1>PEDIDOS PROVEEDORA</h1>
      <p>Sistema de Captura | PROVSOFT</p>
    </div>

  </div>

</div>

<!-- CONTENIDO -->

<div class="container">

  <div class="card">

    <!-- FOLIO -->

    <div class="folio-box">

      <span class="folio-label">
        Folio Actual
      </span>

      <span class="folio-number" id="folioActual">
        PED-00001
      </span>

    </div>

    <!-- GRID -->

    <div class="grid">

      <div>
        <label class="label">Cliente</label>
        <input type="text" id="cliente" class="input">
      </div>

      <div>
        <label class="label">Teléfono</label>
        <input type="text" id="telefono" class="input">
      </div>

      <div>
        <label class="label">Dirección</label>
        <input type="text" id="direccion" class="input">
      </div>

    </div>

    <!-- PEDIDO -->

    <div style="margin-top:20px;">

      <label class="label">
        Pedido / Artículos
      </label>

      <textarea
        id="pedido"
        class="textarea"
        placeholder="Ejemplo:

1 cja galletas marias
2 coca 600ml
5 sabritas fuego"></textarea>

    </div>

    <!-- OBS -->

    <div style="margin-top:20px;">

      <label class="label">
        Observaciones
      </label>

      <textarea
        id="observaciones"
        class="textarea"
        style="min-height:120px;"></textarea>

    </div>

    <!-- BOTONES -->

    <div class="buttons">

      <button
        class="btn btn-save"
        onclick="guardarPedido()">

        🖨 Guardar e Imprimir

      </button>

      <button
        class="btn btn-history"
        onclick="abrirHistorial()">

        📂 Ver Folios

      </button>

      <button
        class="btn btn-clear"
        onclick="limpiarFormulario()">

        🧹 Limpiar

      </button>

    </div>

  </div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

  <div class="modal-content">

    <div class="modal-header">

      <h2>Historial de Pedidos</h2>

      <button
        class="close"
        onclick="cerrarModal()">

        ✕

      </button>

    </div>

    <table>

      <thead>

        <tr>
          <th>Folio</th>
          <th>Cliente</th>
          <th>Fecha</th>
          <th>Acción</th>
        </tr>

      </thead>

      <tbody id="tablaHistorial"></tbody>

    </table>

  </div>

</div>

<!-- TICKET -->

<div id="ticket"></div>

<script>

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1",
  storageBucket: "inventariopv-643f1.firebasestorage.app",
  messagingSenderId: "96242533231",
  appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* =========================
   GENERAR FOLIO
========================= */

async function generarFolio(){

  const snapshot = await db.collection("PEDIDOS-PDD")
  .orderBy("numero","desc")
  .limit(1)
  .get();

  let numero = 1;

  if(!snapshot.empty){

    numero = snapshot.docs[0].data().numero + 1;

  }

  const folio =
  "PED-" + String(numero).padStart(5,"0");

  return {folio, numero};

}

/* =========================
   ACTUALIZAR FOLIO
========================= */

async function actualizarFolioPantalla(){

  const datosFolio = await generarFolio();

  document.getElementById("folioActual")
  .innerText = datosFolio.folio;

}

/* =========================
   GUARDAR
========================= */

async function guardarPedido(){

  const btn =
  document.querySelector(".btn-save");

  try{

    btn.disabled = true;
    btn.innerHTML = "Guardando...";

    const cliente =
    document.getElementById("cliente").value;

    const telefono =
    document.getElementById("telefono").value;

    const direccion =
    document.getElementById("direccion").value;

    const pedido =
    document.getElementById("pedido").value;

    const observaciones =
    document.getElementById("observaciones").value;

    if(!pedido.trim()){

      alert("Debes escribir un pedido");

      btn.disabled = false;
      btn.innerHTML =
      "🖨 Guardar e Imprimir";

      return;

    }

    const datosFolio =
    await generarFolio();

    const ahora = new Date();

    const fechaCorta =
    ahora.toLocaleDateString() + " " +
    ahora.toLocaleTimeString([],{
      hour:'2-digit',
      minute:'2-digit'
    });

    const data = {

      folio:datosFolio.folio,
      numero:datosFolio.numero,

      cliente,
      telefono,
      direccion,
      pedido,
      observaciones,

      fecha:new Date().toISOString(),
      fechaVisual:fechaCorta,

      reimpresiones:0

    };

    const ref =
    await db.collection("PEDIDOS-PDD")
    .add(data);

    await ref.update({
      id:ref.id
    });

    data.id = ref.id;

    imprimirTicket(data,false);

    limpiarFormulario();

    actualizarFolioPantalla();

    document.getElementById("pedido")
    .focus();

  }catch(error){

    console.error(error);

    alert("Error al guardar pedido");

  }finally{

    btn.disabled = false;
    btn.innerHTML =
    "🖨 Guardar e Imprimir";

  }

}

/* =========================
   IMPRIMIR TICKET
========================= */

function imprimirTicket(data,reimpresion=false){

  const ticket =
  document.getElementById("ticket");

  ticket.innerHTML = `

  <div class="ticket-print">

    <div class="ticket-center">

      <div class="ticket-title">
        PEDIDOS<br>
        PROVEEDORA
      </div>

      ${reimpresion ? `
        <div class="ticket-reprint">
          *** REIMPRESIÓN ***
        </div>
      ` : ''}

    </div>

    <div class="ticket-divider"></div>

    <div class="ticket-row">
      <b>FOLIO:</b>
      ${data.folio}
    </div>

    <div class="ticket-row">
      <b>FECHA:</b>
      ${data.fechaVisual || data.fecha}
    </div>

    <div class="ticket-divider"></div>

    <div class="ticket-row">
      <b>CLIENTE:</b>
      ${data.cliente || "-"}
    </div>

    <div class="ticket-row">
      <b>TEL:</b>
      ${data.telefono || "-"}
    </div>

    <div class="ticket-row">
      <b>DIRECCIÓN:</b>
      ${data.direccion || "-"}
    </div>

    <div class="ticket-divider"></div>

    <div class="ticket-section">
      PEDIDO:
    </div>

    <div class="ticket-text">
${data.pedido || ""}
    </div>

    <div class="ticket-divider"></div>

    <div class="ticket-section">
      OBSERVACIONES:
    </div>

    <div class="ticket-text">
${data.observaciones || "-"}
    </div>

    <div class="ticket-divider"></div>

    <div class="ticket-footer">
      ¡GRACIAS!<br>
      www.provsoft.com
    </div>

  </div>

  `;

  ticket.style.display = "block";

  setTimeout(()=>{

    window.print();

    setTimeout(()=>{

      ticket.style.display = "none";

    },500);

  },300);

}

/* =========================
   LIMPIAR
========================= */

function limpiarFormulario(){

  document.getElementById("cliente").value="";
  document.getElementById("telefono").value="";
  document.getElementById("direccion").value="";
  document.getElementById("pedido").value="";
  document.getElementById("observaciones").value="";

}

/* =========================
   MODAL
========================= */

function abrirHistorial(){

  document.getElementById("modal")
  .style.display = "flex";

  cargarHistorial();

}

function cerrarModal(){

  document.getElementById("modal")
  .style.display = "none";

}

/* =========================
   HISTORIAL
========================= */

async function cargarHistorial(){

  const tabla =
  document.getElementById("tablaHistorial");

  tabla.innerHTML = "";

  const snapshot =
  await db.collection("PEDIDOS-PDD")
  .orderBy("numero","desc")
  .get();

  snapshot.forEach(doc=>{

    const data = doc.data();

    const encoded =
    encodeURIComponent(JSON.stringify(data));

    tabla.innerHTML += `

    <tr>

      <td>${data.folio}</td>
      <td>${data.cliente}</td>
      <td>${data.fechaVisual || data.fecha}</td>

      <td>

        <button
          class="reprint"
          onclick='reimprimirDecode("${encoded}")'>

          Reimprimir

        </button>

      </td>

    </tr>

    `;

  });

}

/* =========================
   DECODE
========================= */

function reimprimirDecode(data){

  const pedido =
  JSON.parse(decodeURIComponent(data));

  reimprimir(pedido);

}

/* =========================
   REIMPRIMIR
========================= */

async function reimprimir(data){

  await db.collection("PEDIDOS-PDD")
  .doc(data.id)
  .update({

    reimpresiones:
    firebase.firestore.FieldValue.increment(1)

  });

  data.reimpresiones =
  (data.reimpresiones || 0) + 1;

  imprimirTicket(data,true);

}

/* =========================
   TEXTAREA AUTO HEIGHT
========================= */

const textarea =
document.getElementById("pedido");

textarea.addEventListener("input", ()=>{

  textarea.style.height = "auto";
  textarea.style.height =
  textarea.scrollHeight + "px";

});

const obs =
document.getElementById("observaciones");

obs.addEventListener("input", ()=>{

  obs.style.height = "auto";
  obs.style.height =
  obs.scrollHeight + "px";

});

/* =========================
   CERRAR MODAL AFUERA
========================= */

window.onclick = function(e){

  const modal =
  document.getElementById("modal");

  if(e.target === modal){

    cerrarModal();

  }

}

/* =========================
   INICIO
========================= */

actualizarFolioPantalla();

document.getElementById("pedido")
.focus();

</script>

</body>
</html>
