<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PROVEEDORA DE DULCES Y DESECHABLES POS 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <img id="loginLogo" src="logo_proveedora.webp" alt="Logo La Proveedora">

    <h2>PROVEEDORA DE DULCES Y DESECHABLES</h2>
    <h3>POS 2026</h3>

    <input id="loginUsuario" type="text" placeholder="Usuario">
    <input id="loginPassword" type="password" placeholder="Contraseña">

    <button id="btnLogin" class="btn login-btn">Entrar</button>

    <div id="loginMsg"></div>
  </div>

  <!-- APP PRINCIPAL -->
  <div id="posApp">

    <header class="header-pos">
      <img src="logo_proveedora.webp" alt="Logo">
      <span>PUNTO VENTA 2026</span>
    </header>

    <div id="usuarioBar">Usuario: —</div>

    <div class="main-content">
      <section id="pantallaVenta" class="controls">
        <div class="field searchbox">
          <label>Buscar</label>

          <input
            id="buscador"
            type="text"
            placeholder="Escanea código…"
            autocomplete="off"
            inputmode="none"
          >

          <button id="btnBuscarManual" class="cam-btn" type="button">🔍</button>
          <button id="btnCam" class="cam-btn" type="button">📷</button>

          <div id="resultados" class="search-results"></div>
        </div>
      </section>
    </div>

    <div id="carrito-container">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Cant.</th>
              <th>Importe</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="totals">
      <div class="row muted">
        <span>Subtotal</span>
        <span id="lblSubtotal">$0.00</span>
      </div>

      <div class="row muted">
        <span>Impuestos</span>
        <span id="lblImpuestos">$0.00</span>
      </div>

      <div class="row big">
        <span>Total</span>
        <span id="lblTotal">$0.00</span>
      </div>

      <button class="btn" id="btnCobrar">Cobrar</button>
    </div>

  </div>

  <!-- BOTÓN OPCIONES -->
  <button id="btnOpciones" type="button">⚙️</button>

  <!-- PANTALLA OPCIONES -->
  <div id="pantallaOpciones">
    <h2>Opciones</h2>

    <button id="btnTestPrinter" class="opcion-btn" type="button">
      🖨️ Probar impresora
    </button>

    <button id="btnCorteRuta" class="opcion-btn" type="button">
      📊 Corte
    </button>

    <button id="btnResumen" class="opcion-btn" type="button">
      📋 Resumen
    </button>

    <button id="btnLogout" class="opcion-btn rojo" type="button">
      🚪 Salir
    </button>

    <button id="btnCerrarOpciones" class="opcion-btn gris" type="button">
      ← Regresar al POS
    </button>
  </div>

  <!-- MODAL COBRO -->
  <div id="modalCobro">
    <div class="modal-card">

      <div class="modal-header">Cobro</div>

      <div class="modal-body">

        <div class="row big modal-total-row">
          <span>Total:</span>
          <span id="cobroTotal">$0.00</span>
        </div>

        <input
          id="montoRecibido"
          type="number"
          step="0.01"
          min="0"
          inputmode="decimal"
          placeholder="Monto recibido"
        >

        <div class="row big cambio-row">
          <span>Cambio:</span>
          <span id="montoCambio">$0.00</span>
        </div>

        <div id="descuentoInfo"></div>

        <div class="modal-actions">
          <button id="btnSolicitarDescuento" class="btn btn-descuento">Descuento</button>
          <button id="btnCancelarCobro" class="btn btn-cancelar">Cancelar</button>
          <button id="btnConfirmarCobro" class="btn">Confirmar</button>
        </div>

      </div>
    </div>
  </div>

  <!-- LIBRERÍAS -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="./html5-qrcode.min.js"></script>

  <!-- APP -->
  <script type="module" src="./pos-core.js"></script>

</body>
</html>
